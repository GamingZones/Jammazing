<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - JAMMAZING</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/register.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons());</script>
<style>
/* Lucide icon global sizing */
[data-lucide], i[data-lucide] { display:inline-flex; align-items:center; justify-content:center; }
.nav-button-icon[data-lucide], i.nav-button-icon { width:20px; height:20px; stroke-width:1.75; }
.nav-item-bottom-icon[data-lucide], i.nav-item-bottom-icon { width:22px; height:22px; stroke-width:1.75; }
.settings-btn [data-lucide], .settings-btn i { width:18px; height:18px; }
.settings-dropdown-item [data-lucide], .settings-dropdown-item i { width:14px; height:14px; vertical-align:middle; }
button > [data-lucide], button > i { pointer-events:none; }
</style></head>
<body>
    <!-- Dark mode toggle -->
    <button id="darkModeToggle" onclick="toggleDarkMode()" title="Toggle dark mode" style="position:fixed;top:16px;right:16px;z-index:100;background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.3);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#444;transition:all 0.2s;"><i data-lucide="moon" id="darkModeIcon" style="width:18px;height:18px;"></i></button>
    <div class="register-container">
        <div class="register-header">
            <h1>JAMMAZING</h1>
            <p>Join Our Music Community</p>
        </div>

        <div class="register-body">
            <div id="alertContainer"></div>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="firstName">First Name *</label>
                    <input type="text" id="firstName" name="firstName" required>
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name *</label>
                    <input type="text" id="lastName" name="lastName" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label>Account Type *</label>
                    <div>
                        <div class="form-check-inline">
                            <input class="form-check-input" type="radio" name="accountType" id="student" value="student" required>
                            <label class="form-check-label" for="student">Student</label>
                        </div>
                        <div class="form-check-inline">
                            <input class="form-check-input" type="radio" name="accountType" id="instructor" value="instructor">
                            <label class="form-check-label" for="instructor">Instructor</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="instrument">Instrument *</label>
                    <select id="instrument" name="instrument" required>
                        <option value="">Select an instrument</option>
                        <option value="guitar">Guitar</option>
                        <option value="drums">Drums</option>
                        <option value="bass">Bass</option>
                        <option value="keyboard">Keyboard</option>
                        <option value="vocals">Vocals</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <div class="password-container">
                            <input type="password" id="password" name="password" required>
                            <button type="button" class="toggle-password" id="togglePassword" title="Show/hide password"><i data-lucide="eye" id="eyeIcon"></i></button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password *</label>
                        <div class="password-container">
                            <input type="password" id="confirmPassword" name="confirmPassword" required>
                            <button type="button" class="toggle-password" id="toggleConfirmPassword" title="Show/hide password"><i data-lucide="eye" id="eyeIconConfirm"></i></button>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-check-inline">
                        <input class="form-check-input" type="checkbox" id="terms" name="terms" required>
                        <label class="form-check-label" for="terms">I agree to the Terms and Conditions</label>
                    </div>
                </div>

                <button type="submit" class="btn-register">
                    <span class="spinner-border" role="status" id="spinnerRegister" style="display: none;"></span>
                    Create Account
                </button>
            </form>

            <div class="register-footer">
                <p>Already have an account? <a href="../Pages/login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function(e) {
            e.preventDefault();
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            icon.setAttribute('data-lucide', show ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        document.getElementById('toggleConfirmPassword').addEventListener('click', function(e) {
            e.preventDefault();
            const input = document.getElementById('confirmPassword');
            const icon = document.getElementById('eyeIconConfirm');
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            icon.setAttribute('data-lucide', show ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('loginDarkMode', isDark);
            const icon = document.getElementById('darkModeIcon');
            icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
            const btn = document.getElementById('darkModeToggle');
            btn.style.color = isDark ? '#f0f0f0' : '#444';
            btn.style.background = isDark ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.2)';
        }
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('loginDarkMode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeIcon').setAttribute('data-lucide', 'sun');
                document.getElementById('darkModeToggle').style.color = '#f0f0f0';
                document.getElementById('darkModeToggle').style.background = 'rgba(0,0,0,0.3)';
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
