<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Learning - JAMMAZING</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/home.css">
    <style>
        .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 8px; }
        .quiz-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 10px; transition: transform 0.2s, box-shadow 0.2s; position: relative; }
        .quiz-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(102,126,234,0.18); }
        .quiz-card-title { font-size: 17px; font-weight: 700; color: var(--text-primary); margin: 0; }
        .quiz-card-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-secondary); flex-wrap: wrap; }
        .quiz-card-description { font-size: 13px; color: var(--text-secondary); margin: 0; }
        .quiz-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; padding-top: 10px; border-top: 1px solid var(--border-color); }
        .quiz-card-instructor { font-size: 12px; font-weight: 600; color: #667eea; background: rgba(102,126,234,0.12); padding: 3px 10px; border-radius: 20px; }
        .quiz-card-button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: transform 0.15s; }
        .quiz-card-button:hover { transform: scale(1.05); }
        .quiz-empty-state { grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary); }
    </style>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons());</script>
<style>
/* Lucide icon global sizing */
[data-lucide], i[data-lucide] { display:inline-flex; align-items:center; justify-content:center; }
.nav-button-icon[data-lucide], i.nav-button-icon { width:20px; height:20px; stroke-width:1.75; }
.nav-item-bottom-icon[data-lucide], i.nav-item-bottom-icon { width:22px; height:22px; stroke-width:1.75; }
.settings-btn [data-lucide], .settings-btn i { width:18px; height:18px; }
.settings-dropdown-item [data-lucide], .settings-dropdown-item i { width:14px; height:14px; vertical-align:middle; }
button > [data-lucide], button > i { pointer-events:none; }
</style></head>
<body>
    <script>
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
            document.documentElement.style.colorScheme = 'dark';
            document.body.classList.add('dark-theme');
        }
    </script>
    <!-- Top Navigation -->
    <nav class="navbar-top">
        <div class="navbar-top-container">
            <a href="../Pages/home.html" class="navbar-brand">Jammazing</a>
            <div class="navbar-search-top">
                <input type="text" class="search-input" placeholder="Search...">
                <div style="position: relative;">
                    <button class="settings-btn" id="settingsBtn" title="Settings"><i data-lucide="settings"></i></button>
                    <div class="settings-dropdown" id="settingsDropdown">
                        <button class="settings-dropdown-item" id="themeLightDark">
                            <span><i data-lucide="moon"></i> Dark Mode</span>
                        </button>
                        <button class="settings-dropdown-item" id="logoutBtn" onclick="logout()">
                            <span><i data-lucide="log-out"></i> Logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-layout">
        <!-- Left Sidebar - Profile -->
        <div class="left-sidebar">
            <a href="../Pages/profile.html" class="profile-card-line">
                <div class="profile-avatar-large"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48" fill="none"><circle cx="32" cy="24" r="13" fill="rgba(255,255,255,0.85)"/><ellipse cx="32" cy="54" rx="22" ry="13" fill="rgba(255,255,255,0.85)"/></svg></div>
                <div class="profile-info-line">
                    <h3 id="profileName" class="profile-name">Loading...</h3>
                    <p id="profileRole" class="profile-role">@username</p>
                </div>
            </a>
            <!-- Navigation Buttons -->
            <div class="navigation-buttons">
                <a href="../Pages/live-streams.html" class="nav-button">
                    <i data-lucide="video" class="nav-button-icon"></i>
                    <span class="nav-button-text">Live Streams</span>
                </a>
                <button id="searchNavBtn" class="nav-button">
                    <i data-lucide="search" class="nav-button-icon"></i>
                    <span class="nav-button-text">Search People</span>
                </button>
                <a href="../Pages/ai-learning.html" class="nav-button">
                    <i data-lucide="graduation-cap" class="nav-button-icon"></i>
                    <span class="nav-button-text">Quizzes</span>
                </a>
                <a href="../Pages/ai-jamming.html" class="nav-button">
                    <i data-lucide="music" class="nav-button-icon"></i>
                    <span class="nav-button-text">Music Mixer</span>
                </a>
            </div>
        </div>

        <!-- Center Feed - Learning Content -->
        <div class="center-feed">
            <div class="post">
                <h3 style="margin: 0 0 12px 0; font-size: 20px; font-weight: 600;">AI Learning</h3>
                <a id="createQuizBtn" href="../Pages/create-quiz.html" style="display: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-bottom: 16px; text-decoration: none;">+ Create Quiz</a>
                <div id="sampleQuizzesContainer" class="quiz-grid"></div>
            </div>
        </div>

        <!-- Right Sidebar -->
        <div class="right-sidebar">
            <div class="notifications-card">
                <h3 class="sidebar-title">Notifications</h3>
                                <div class="notifications-list" id="sidebarNotifList"><div style="padding:8px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
                <a href="../Pages/notifications.html" class="view-all-link">View all notifications</a>
            </div>
    <!-- Floating Messages Sidebar -->
    <div id="messagesSidebar" class="friends-sidebar" style="cursor: pointer;">
        <div class="friends-sidebar-header" onclick="toggleMessagesSidebar()" style="cursor: pointer;">
            <h4>Messages</h4>
            <button id="closeMessagesSidebar" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary);" onclick="event.stopPropagation(); closeMessagesSidebar();"><i data-lucide="x"></i></button>
        </div>
        <div class="friends-sidebar-list" id="messagesSidebarList"><div style="padding:12px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
    </div>

        <!-- Floating Friends Sidebar -->
    <div id="friendsSidebar" class="friends-sidebar" style="display: none;">
        <div class="friends-sidebar-header">
            <h4 style="margin: 0; color: var(--text-primary);">Friends</h4>
            <button id="closeFriendsSidebar" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary);"><i data-lucide="x"></i></button>
        </div>
        <div class="friends-sidebar-list" id="friendsSidebarList"><div style="padding:8px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
    </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div id="deleteConfirmModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.55); z-index:3000; align-items:center; justify-content:center;">
        <div style="background:var(--bg-secondary); border-radius:14px; padding:28px 32px; width:90%; max-width:380px; box-shadow:0 12px 40px rgba(0,0,0,0.35); text-align:center;">
            <div style="margin-bottom:12px;"><i data-lucide="trash-2" style="width:36px;height:36px;color:#ccc;"></i></div>
            <h3 style="margin:0 0 8px; color:var(--text-primary); font-size:18px;">Delete Quiz?</h3>
            <p style="margin:0 0 24px; color:var(--text-secondary); font-size:14px;">This cannot be undone.</p>
            <div style="display:flex; gap:12px; justify-content:center;">
                <button onclick="cancelDeleteQuiz()" style="padding:9px 24px; border-radius:8px; border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary); font-size:14px; cursor:pointer;">Cancel</button>
                <button id="confirmDeleteBtn" style="padding:9px 24px; border-radius:8px; border:none; background:#e53e3e; color:#fff; font-size:14px; font-weight:600; cursor:pointer;">Delete</button>
            </div>
        </div>
    </div>

    <!-- Conversation Modal -->
    <div id="conversationModal" style="display: none; position: fixed; bottom: 24px; right: 24px; z-index: 2000; width: 340px; height: 480px;">
        <div style="background: var(--bg-secondary); border-radius: 16px; width: 100%; height: 100%; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.3); overflow: hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#667eea,#764ba2);flex-shrink:0;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div id="chatAvatar" style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;"></div>
                    <div>
                        <div id="chatTitle" style="color:white;font-weight:600;font-size:14px;">Chat</div>
                        <div id="chatUsername" style="color:rgba(255,255,255,0.7);font-size:11px;"></div>
                    </div>
                </div>
                <div style="display:flex;gap:6px;"><button id="chatProfileBtn" style="background:rgba(255,255,255,0.1);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#ccc;" title="View Profile"><i data-lucide="user" style="width:14px;height:14px;"></i></button><button onclick="closeConversationModal()" style="background:rgba(255,255,255,0.1);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#ccc;"><i data-lucide="x" style="width:14px;height:14px;"></i></button></div>
            </div>
            <div id="messagesContainer" class="messages-container" style="flex-grow:1;overflow-y:auto;padding:12px;background:var(--bg-primary);"></div>
            <div style="padding:10px 12px;border-top:1px solid var(--border-color);display:flex;gap:8px;flex-shrink:0;">
                <input type="text" id="messageInput" placeholder="Type a message..." style="flex:1;padding:8px 12px;border-radius:20px;border:1px solid var(--border-color);background:var(--bg-secondary);color:var(--text-primary);outline:none;font-size:13px;" onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" style="background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:white;padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:500;font-size:13px;">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        function setActiveNav(e, page) {
            document.querySelectorAll('.nav-item-bottom').forEach(el => el.classList.remove('active'));
            e.currentTarget.classList.add('active');
            localStorage.setItem('currentPage', page);
        }

        async function loadQuizzes() {
            try {
                const response = await fetch(`${API_BASE_URL}/quizzes`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load quizzes');
                }

                const quizzes = await response.json();
                // Cache quizzes in localStorage
                const userId = localStorage.getItem('userId');
                const userQuizzes = quizzes.filter(q => String(q.creatorId) === String(userId));
                if (userQuizzes.length > 0) {
                    localStorage.setItem(`userQuizzes_${userId}`, JSON.stringify(userQuizzes));
                    console.log(`💾 Cached ${userQuizzes.length} quizzes to localStorage`);
                }
                displayQuizzes(quizzes);
            } catch (error) {
                console.error('Load quizzes error:', error);
                // Fallback to localStorage cache
                const userId = localStorage.getItem('userId');
                const cachedQuizzes = localStorage.getItem(`userQuizzes_${userId}`);
                if (cachedQuizzes) {
                    try {
                        const quizzes = JSON.parse(cachedQuizzes);
                        console.log(`📦 Using cached quizzes from localStorage:`, quizzes);
                        displayQuizzes(quizzes);
                    } catch (e) {
                        console.error('Could not parse cached quizzes:', e);
                    }
                }
            }
        }

        function displayQuizzes(quizzes) {
            const container = document.getElementById('sampleQuizzesContainer');
            const currentUserId = localStorage.getItem('userId');
            
            // Filter to show only quizzes created by the current user
            const userQuizzes = quizzes.filter(quiz => String(quiz.creatorId) === String(currentUserId));
            
            console.log(`📊 Displaying ${userQuizzes.length} user quizzes:`, userQuizzes.map(q => ({ id: q.id, title: q.title, creatorId: q.creatorId })));
            
            if (!userQuizzes || userQuizzes.length === 0) {
                container.innerHTML = '<div class="quiz-empty-state"><div style="margin-bottom: 12px;"><i data-lucide="file-text" style="width:48px;height:48px;color:#ccc;"></i></div><h3 style="margin-bottom: 8px;">No quizzes yet</h3><p>Create your first quiz to get started!</p></div>';
                lucide.createIcons();
                return;
            }

            const difficultyColors = { easy: '#28a745', beginner: '#28a745', medium: '#fd7e14', intermediate: '#fd7e14', hard: '#dc3545', advanced: '#dc3545' };

            container.innerHTML = userQuizzes.map(quiz => {
                const diff = (quiz.difficultyLevel || '').toLowerCase();
                const badgeColor = difficultyColors[diff] || '#667eea';
                const timeLimit = quiz.timeLimit || 5;
                const totalQ = quiz.totalQuestions || 0;
                const creator = quiz.creatorName || 'Unknown';
                const displayTitle = quiz.title || `Quiz (${quiz.id})`;
                const displayDesc = quiz.description || '';
                
                console.log(`  📌 Quiz card: title="${displayTitle}", desc="${displayDesc}"`);
                
                return `
                <div class="quiz-card">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;">
                        <h3 class="quiz-card-title">${displayTitle}</h3>
                        <span style="background: ${badgeColor}22; color: ${badgeColor}; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap;">${capitalizeFirst(quiz.difficultyLevel)}</span>
                    </div>
                    <div class="quiz-card-meta">
                        <span title="Time limit"><i data-lucide="clock" style="width:12px;height:12px;"></i> ${timeLimit} min</span>
                        <span title="Questions"><i data-lucide="help-circle" style="width:12px;height:12px;"></i> ${totalQ} Questions</span>
                        <span title="Type"><i data-lucide="music" style="width:12px;height:12px;"></i> ${capitalizeFirst(quiz.quizType) || 'General'}</span>
                    </div>
                    ${displayDesc ? `<p class="quiz-card-description">${displayDesc}</p>` : ''}
                    <div class="quiz-card-footer">
                        <span class="quiz-card-instructor"><i data-lucide="user" style="width:12px;height:12px;"></i> ${creator}</span>
                        <div style="display:flex;gap:8px;">
                            ${String(quiz.creatorId) === String(currentUserId) ? `<button class="quiz-card-button" style="background:#e53e3e;" onclick="deleteQuiz('${quiz.id}', this)"><i data-lucide="trash-2" style="width:13px;height:13px;"></i> Delete</button>` : ''}
                            <button class="quiz-card-button" onclick="startQuiz('${quiz.id}')"><i data-lucide="play" style="width:13px;height:13px;"></i> Start Quiz</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function capitalizeFirst(str) {
            if (!str) return '';
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function startQuiz(quizId) {
            window.location.href = `../Pages/quiz-interface.html?quizId=${quizId}`;
        }

        let _deleteQuizId = null, _deleteQuizBtn = null;

        function deleteQuiz(quizId, btn) {
            _deleteQuizId = quizId;
            _deleteQuizBtn = btn;
            const modal = document.getElementById('deleteConfirmModal');
            modal.style.display = 'flex';
            document.getElementById('confirmDeleteBtn').onclick = confirmDeleteQuiz;
        }

        function cancelDeleteQuiz() {
            document.getElementById('deleteConfirmModal').style.display = 'none';
            _deleteQuizId = null; _deleteQuizBtn = null;
        }

        async function confirmDeleteQuiz() {
            const modal = document.getElementById('deleteConfirmModal');
            modal.style.display = 'none';
            const userId = localStorage.getItem('userId');
            try {
                const res = await fetch(`${API_BASE_URL}/quizzes/${_deleteQuizId}?userId=${userId}`, { method: 'DELETE' });
                if (res.ok) {
                    _deleteQuizBtn.closest('.quiz-card').remove();
                } else {
                    const err = await res.json();
                    alert(err.error || 'Failed to delete quiz.');
                }
            } catch (e) {
                alert('Could not delete quiz.');
            }
            _deleteQuizId = null; _deleteQuizBtn = null;
        }

        function openCreateQuiz() {
            window.location.href = '../Pages/create-quiz.html';
        }

        window.addEventListener('load', () => {
            if (!localStorage.getItem('userId')) {
                window.location.href = '../Pages/login.html';
                return;
            }

            const userFirstName = localStorage.getItem('userFirstName') || 'User';
            const userLastName = localStorage.getItem('userLastName') || 'Profile';
            const profileName = document.getElementById('profileName');
            const profileRole = document.getElementById('profileRole');
            if (profileName) profileName.textContent = `${userFirstName} ${userLastName}`;
            if (profileRole) profileRole.textContent = `@${userFirstName.toLowerCase()}${userLastName.toLowerCase()}`;

            const userRole = (localStorage.getItem('userRole') || '').toLowerCase();
            const accountType = (localStorage.getItem('accountType') || '').toLowerCase();
            const createQuizBtn = document.getElementById('createQuizBtn');
            if ((userRole === 'instructor' || accountType === 'instructor') && createQuizBtn) {
                createQuizBtn.style.display = 'inline-block';
            }

            loadQuizzes();
        });

        // Settings Dropdown
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsDropdown = document.getElementById('settingsDropdown');
        const themeLightDarkBtn = document.getElementById('themeLightDark');
        
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsDropdown.classList.toggle('show');
        });
        
        document.addEventListener('click', (e) => {
            if (!settingsBtn.contains(e.target) && !settingsDropdown.contains(e.target)) {
                settingsDropdown.classList.remove('show');
            }
        });
        
        function updateThemeButtonText() {
            const isDark = document.body.classList.contains('dark-theme');
            themeLightDarkBtn.innerHTML = isDark ? '<span><i data-lucide="sun"></i> Light Mode</span>' : '<span><i data-lucide="moon"></i> Dark Mode</span>';
            lucide.createIcons();
        }
        
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-theme');
        }
        updateThemeButtonText();
        
        themeLightDarkBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButtonText();
            settingsDropdown.classList.remove('show');
        });
        
        // Friends Sidebar & Messages
        const searchNavBtn = document.getElementById('searchNavBtn');
        const messagesSidebar = document.getElementById('messagesSidebar');
        const friendsSidebar = document.getElementById('friendsSidebar');
        const closeFriendsSidebarBtn = document.getElementById('closeFriendsSidebar');
        
        function handleSearchClick() {
            window.location.href = '../Pages/search.html';
        }
        
        if (searchNavBtn) {
            searchNavBtn.addEventListener('click', handleSearchClick);
        }
        
        function toggleMessagesSidebar() {
            messagesSidebar.classList.toggle('collapsed');
        }
        
        function closeMessagesSidebar() {
            messagesSidebar.classList.add('collapsed');
        }
        
        if (closeFriendsSidebarBtn) {
            closeFriendsSidebarBtn.addEventListener('click', () => {
                friendsSidebar.style.display = 'none';
            });
        }
        
        function logout() {
            localStorage.removeItem('userId');
            localStorage.removeItem('userFirstName');
            localStorage.removeItem('userLastName');
            window.location.href = '../Pages/login.html';
        }
    </script>
</body>
</html>
