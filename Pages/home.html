<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - JAMMAZING</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons());</script>
<style>
/* Lucide icon global sizing */
[data-lucide], i[data-lucide] { display:inline-flex; align-items:center; justify-content:center; }
.nav-button-icon[data-lucide], i.nav-button-icon { width:20px; height:20px; stroke-width:1.75; }
.nav-item-bottom-icon[data-lucide], i.nav-item-bottom-icon { width:22px; height:22px; stroke-width:1.75; }
.settings-btn [data-lucide], .settings-btn i { width:18px; height:18px; }
.settings-dropdown-item [data-lucide], .settings-dropdown-item i { width:14px; height:14px; vertical-align:middle; }
button > [data-lucide], button > i { pointer-events:none; }
</style></head>
<body>

        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
            document.documentElement.style.colorScheme = 'dark';
            document.body.classList.add('dark-theme');
        }
    </script>

        <div class="navbar-top-container">
            <a href="../Pages/home.html" class="navbar-brand">Jammazing</a>
            <div class="navbar-search-top">
                <input type="text" class="search-input" placeholder="Search...">
                <div style="position: relative;">
                    <button class="settings-btn" id="settingsBtn" title="Settings"><i data-lucide="settings"></i></button>
                    <div class="settings-dropdown" id="settingsDropdown">

                    <input type="text" id="composerInput" class="composer-input" placeholder="What's on your mind?" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitPost();}" oninput="handleMentionInput(this)" autocomplete="off">
                    <div id="mentionDropdown" style="display:none;position:absolute;top:100%;left:48px;right:0;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.3);z-index:100;max-height:180px;overflow-y:auto;"></div>

        </div>
        <div class="friends-sidebar-list" id="messagesSidebarList"><div style="padding:12px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
    </div>

        <!-- Floating Friends Sidebar -->

        <div class="friends-sidebar-header">
            <h4 style="margin: 0; color: var(--text-primary);">Friends</h4>

        </div>
        <div class="friends-sidebar-list" id="friendsSidebarList"><div style="padding:8px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
            </div>

    <!-- Post Detail Modal -->
    <div id="postDetailModal" onclick="closePostModalOnOverlay(event)">

    <!-- Conversation Modal -->

            <!-- Messages -->

                    <button onclick="sendMessage()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 13px; flex-shrink:0;">Send</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        async function initializeProfile() {
            // Check if user has userId (is logged in)
            const userId = localStorage.getItem('userId');
            if (!userId) {
                // User is not logged in, redirect to login
                window.location.href = '../Pages/login.html';
                return;
            }
            
            // Try to get user data from localStorage first
            let userFirstName = localStorage.getItem('userFirstName');
            let userLastName = localStorage.getItem('userLastName');
            let userRole = localStorage.getItem('userRole');
            
            // If not in localStorage, fetch from API
            if (!userFirstName || !userLastName) {
                try {
                    const res = await fetch(`${API_BASE_URL}/users/${userId}`);
                    if (res.ok) {
                        const user = await res.json();
                        userFirstName = user.firstName || userFirstName || 'User';
                        userLastName = user.lastName || userLastName || '';
                        userRole = user.role || userRole || 'student';
                        
                        // Save to localStorage for next time
                        localStorage.setItem('userFirstName', userFirstName);
                        localStorage.setItem('userLastName', userLastName);
                        localStorage.setItem('userRole', userRole);
                    }
                } catch (e) {
                    console.error('Failed to load user data:', e);
                }
            }
            
            // Set defaults if still not available
            userFirstName = userFirstName || 'User';
            userLastName = userLastName || '';
            userRole = userRole || 'student';
            
            // Update profile info
            const profileName = document.getElementById('profileName');
            const profileRole = document.getElementById('profileRole');
            
            if (profileName) {
                profileName.textContent = userFirstName + ' ' + userLastName;
            }
            if (profileRole) {
                profileRole.textContent = '@' + (userFirstName.toLowerCase() + userLastName.toLowerCase());
            }
            
            // Load sample feed posts
            loadFeedPosts();

            // Apply saved profile picture to composer
            const savedPic = localStorage.getItem('profilePicture_' + userId);
            if (savedPic) applyComposerAvatar(savedPic);
        }
        
        // Initialize profile when DOM is ready
        document.addEventListener('DOMContentLoaded', initializeProfile);

        async function loadFeedPosts() {
            const feedPosts = document.getElementById('feedPosts');
            feedPosts.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-secondary);">Loading posts...</div>';
            try {
                const userId = localStorage.getItem('userId') || '';
                const res = await fetch(`${API_BASE_URL}/posts?userId=${userId}`);
                if (!res.ok) throw new Error();
                const posts = await res.json();
                renderPosts(posts);
            } catch {
                feedPosts.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-secondary);">Could not load posts.</div>';
            }
        }

        function timeAgo(dateStr) {
            // SQLite stores UTC without Z — append it so JS parses correctly
            const normalized = dateStr && !dateStr.endsWith('Z') ? dateStr.replace(' ', 'T') + 'Z' : dateStr;
            const diff = Math.floor((Date.now() - new Date(normalized)) / 1000);
            if (diff < 60) return 'just now';
            if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
            return `${Math.floor(diff/86400)}d ago`;
        }

        function renderPosts(posts) {
            const feedPosts = document.getElementById('feedPosts');
            const currentUserId = localStorage.getItem('userId');
            if (!posts.length) {
                feedPosts.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-secondary);font-size:14px;">No posts yet. Be the first to share something!</div>';
                return;
            }
            feedPosts.innerHTML = posts.map(post => {
                const avatarHtml = post.profilePicture
                    ? `<img src="${post.profilePicture}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
                    : `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="36" height="36" fill="none"><circle cx="32" cy="24" r="13" fill="rgba(255,255,255,0.85)"/><ellipse cx="32" cy="54" rx="22" ry="13" fill="rgba(255,255,255,0.85)"/></svg>`;
                const deleteBtn = String(post.userId) === String(currentUserId)
                    ? `<button onclick="deletePost('${post.id}', this)" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:18px;padding:0 4px;" title="Delete post"><i data-lucide="trash-2" style="width:16px;height:16px;pointer-events:none;"></i></button>`
                    : '';
                const repostBanner = post.repostedByUsername
                    ? `<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-secondary);padding:6px 12px 0;">
                        <i data-lucide="repeat-2" style="width:13px;height:13px;"></i>
                        <span onclick="event.stopPropagation();navigateToProfile('${post.repostedByUsername}')" style="cursor:pointer;font-weight:500;">@${post.repostedByUsername} reposted</span>
                      </div>`
                    : '';
                return `
                <div class="post" data-post-id="${post.id}" onclick="openPostModal('${post.id}', event)" style="cursor:pointer;">
                    ${repostBanner}
                    <div class="post-header">
                        <div class="post-author-info">
                            <div class="post-avatar">${avatarHtml}</div>
                            <div class="post-meta">
                                <p class="post-author"><strong>${post.firstName} ${post.lastName}</strong></p>
                                <p class="post-time">@${post.username} &middot; ${timeAgo(post.createdAt)}</p>
                            </div>
                        </div>
                        <div class="post-menu">${deleteBtn}</div>
                    </div>
                    <p class="post-content">${_renderMentions(post.content)}</p>
                    ${_renderMediaHtml(post.imageData)}
                    <div class="post-actions">
                        <span class="action-item" onclick="toggleLike(this)" data-liked="0" style="cursor:pointer;user-select:none;"><i data-lucide="heart" class="like-icon" style="width:16px;height:16px;"></i> <span class="like-count">${post.likeCount||0}</span> Like</span>
                        <span class="action-item" onclick="toggleRepost(this, '${post.id}')" data-reposted="${post.userReposted||0}" data-post-id="${post.id}" style="cursor:pointer;user-select:none;${post.userReposted ? 'color:#17bf63;' : ''}"><i data-lucide="repeat-2" class="repost-icon" style="width:16px;height:16px;"></i> <span class="repost-count">${post.repostCount||0}</span> Repost</span>
                        <span class="action-item" onclick="toggleCommentBox(this, '${post.id}')" style="cursor:pointer;user-select:none;"><i data-lucide="message-circle" style="width:16px;height:16px;"></i> <span class="comment-count">${post.commentCount||0}</span> Comment</span>
                    </div>
                    <div class="comment-box" style="display:none;padding:8px 0 4px;" data-post-id="${post.id}" data-loaded="0">
                        <input type="text" class="comment-input" placeholder="Write a comment..." style="width:100%;padding:8px 12px;border-radius:20px;border:1px solid var(--border-color);background:var(--input-bg,var(--card-bg));color:var(--text-primary);outline:none;font-size:13px;" onkeydown="if(event.key==='Enter'){submitComment(this);}">
                        <div class="comments-list" style="margin-top:6px;"></div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // --- Multi-media state ---
        let _postMediaItems = []; // [{type:'image'|'video', dataUrl}]
        let _allUsers = []; // cache for @mention

        function _showToast(msg) {
            const t = document.createElement('div');
            t.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1e1e2e;color:#fff;border:1px solid rgba(255,255,255,0.15);padding:12px 20px;border-radius:10px;font-size:13px;z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,0.5);display:flex;align-items:center;gap:12px;white-space:nowrap;';
            const span = document.createElement('span');
            span.textContent = msg;
            const btn = document.createElement('button');
            btn.innerHTML = '&times;';
            btn.style.cssText = 'background:none;border:none;color:#fff;font-size:18px;line-height:1;cursor:pointer;padding:0;opacity:0.7;';
            btn.onmouseover = () => btn.style.opacity = '1';
            btn.onmouseout = () => btn.style.opacity = '0.7';
            btn.onclick = () => t.remove();
            t.appendChild(span);
            t.appendChild(btn);
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 10000);
        }

        function _renderThumbnails() {
            const content = document.getElementById('composerPreviewContent');
            const preview = document.getElementById('composerPreview');
            if (!_postMediaItems.length) { preview.style.display = 'none'; content.innerHTML = ''; return; }
            preview.style.display = 'block';
            content.innerHTML = _postMediaItems.map((item, i) => {
                const thumb = item.type === 'video'
                    ? `<video src="${item.dataUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:6px;display:block;"></video>`
                    : `<img src="${item.dataUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:6px;display:block;">`;
                return `<div style="position:relative;width:80px;height:80px;flex-shrink:0;">
                    ${thumb}
                    <button onclick="removeMediaItem(${i})" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.65);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;line-height:1;padding:0;">&times;</button>
                </div>`;
            }).join('');
        }

        function removeMediaItem(i) {
            _postMediaItems.splice(i, 1);
            _renderThumbnails();
        }

        function clearComposerPreview() {
            _postMediaItems = [];
            document.getElementById('postImageInput').value = '';
            document.getElementById('postVideoInput').value = '';
            _renderThumbnails();
        }

        function triggerImagePicker() {
            document.getElementById('postImageInput').click();
        }

        function triggerVideoPicker() {
            document.getElementById('postVideoInput').click();
        }

        function previewPostVideo(input) {
            const files = Array.from(input.files);
            if (files.length === 0) { input.value = ''; return; }
            let loaded = 0;
            const validFiles = files.filter(file => {
                if (file.size > 50 * 1024 * 1024) {
                    _showToast(`"${file.name}" is too large (max 50MB). Skipped.`);
                    return false;
                }
                return true;
            });
            if (validFiles.length === 0) { input.value = ''; return; }
            validFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => { _postMediaItems.push({type:'video', dataUrl: e.target.result}); loaded++; if (loaded === validFiles.length) _renderThumbnails(); };
                reader.readAsDataURL(file);
            });
            input.value = '';
        }

        function previewPostImage(input) {
            const files = Array.from(input.files);
            let loaded = 0;
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => { _postMediaItems.push({type:'image', dataUrl: e.target.result}); loaded++; if (loaded === files.length) _renderThumbnails(); };
                reader.readAsDataURL(file);
            });
            input.value = '';
        }

        async function submitPost() {
            const input = document.getElementById('composerInput');
            const content = input ? input.value.trim() : '';
            if (!content && _postMediaItems.length === 0) {
                input.style.borderColor = '#e0245e';
                input.placeholder = 'Please add a caption or attach a photo/video';
                setTimeout(() => { input.style.borderColor = ''; input.placeholder = "What's on your mind?"; }, 2500);
                return;
            }
            const userId = localStorage.getItem('userId');
            if (!userId) return;
            const btn = document.querySelector('.post-btn');
            if (btn) { btn.textContent = 'Posting...'; btn.disabled = true; }
            try {
                const mediaJson = _postMediaItems.length ? JSON.stringify(_postMediaItems) : null;
                const res = await fetch(`${API_BASE_URL}/posts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, content: content || ' ', imageData: mediaJson, videoData: null })
                });
                if (res.ok) {
                    const newPost = await res.json();
                    input.value = '';
                    input.placeholder = "What's on your mind?";
                    _postMediaItems = [];
                    _renderThumbnails();
                    // Prepend to feed
                    const feedPosts = document.getElementById('feedPosts');
                    const empty = feedPosts.querySelector('[style*="No posts"]');
                    if (empty) feedPosts.innerHTML = '';
                    const tmp = document.createElement('div');
                    const currentUserId = localStorage.getItem('userId');
                    const savedPic = currentUserId ? localStorage.getItem(`profilePicture_${currentUserId}`) : null;
                    if (!newPost.profilePicture && savedPic) newPost.profilePicture = savedPic;
                    tmp.innerHTML = renderSinglePost(newPost, currentUserId);
                    feedPosts.prepend(tmp.firstElementChild);
                    lucide.createIcons();
                }
            } catch (e) { console.error('Post error:', e); }
            if (btn) { btn.textContent = 'Post'; btn.disabled = false; }
        }

        function _renderMentions(text) {
            return text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')
                .replace(/@(\w+)/g, (_, u) => `<a href="../Pages/profile.html?username=${u}" style="color:#667eea;text-decoration:none;font-weight:500;">@${u}</a>`);
        }

        function _renderMediaHtml(imageData) {
            if (!imageData) return '';
            let items;
            try { items = JSON.parse(imageData); } catch { items = null; }
            if (Array.isArray(items)) {
                if (items.length === 1) {
                    const m = items[0];
                    return m.type === 'video'
                        ? `<div style="width:100%;border-radius:10px;overflow:hidden;margin:6px 0;"><video controls src="${m.dataUrl}" style="width:100%;max-height:360px;display:block;"></video></div>`
                        : `<div style="width:100%;height:360px;border-radius:10px;overflow:hidden;margin:6px 0;"><img src="${m.dataUrl}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>`;
                }
                const MAX_SHOW = 5;
                const showItems = items.slice(0, MAX_SHOW);
                const extra = items.length - MAX_SHOW;
                const GAP = 3;

                function cell(m, showOverlay) {
                    const media = m.type === 'video'
                        ? `<video src="${m.dataUrl}" style="width:100%;height:100%;object-fit:cover;display:block;"></video>`
                        : `<img src="${m.dataUrl}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
                    const overlay = showOverlay && extra > 0
                        ? `<div style="position:absolute;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;pointer-events:none;">+${extra}</div>`
                        : '';
                    return `<div style="position:relative;overflow:hidden;width:100%;height:100%;">${media}${overlay}</div>`;
                }

                if (showItems.length === 2) {
                    return `<div style="width:100%;height:300px;display:flex;gap:${GAP}px;border-radius:10px;overflow:hidden;margin:6px 0;">
                        <div style="flex:1;height:300px;">${cell(showItems[0], false)}</div>
                        <div style="flex:1;height:300px;">${cell(showItems[1], extra > 0)}</div>
                    </div>`;
                }
                if (showItems.length === 3) {
                    return `<div style="width:100%;height:300px;display:flex;gap:${GAP}px;border-radius:10px;overflow:hidden;margin:6px 0;">
                        <div style="flex:1;height:300px;">${cell(showItems[0], false)}</div>
                        <div style="flex:1;height:300px;display:flex;flex-direction:column;gap:${GAP}px;">
                            <div style="flex:1;min-height:0;">${cell(showItems[1], false)}</div>
                            <div style="flex:1;min-height:0;">${cell(showItems[2], extra > 0)}</div>
                        </div>
                    </div>`;
                }
                if (showItems.length === 4) {
                    return `<div style="width:100%;height:300px;display:flex;gap:${GAP}px;border-radius:10px;overflow:hidden;margin:6px 0;">
                        <div style="flex:1;height:300px;display:flex;flex-direction:column;gap:${GAP}px;">
                            <div style="flex:1;min-height:0;">${cell(showItems[0], false)}</div>
                            <div style="flex:1;min-height:0;">${cell(showItems[1], false)}</div>
                        </div>
                        <div style="flex:1;height:300px;display:flex;flex-direction:column;gap:${GAP}px;">
                            <div style="flex:1;min-height:0;">${cell(showItems[2], false)}</div>
                            <div style="flex:1;min-height:0;">${cell(showItems[3], extra > 0)}</div>
                        </div>
                    </div>`;
                }
                // 5+: 2 left, 3 right, +N on bottom-right
                return `<div style="width:100%;height:300px;display:flex;gap:${GAP}px;border-radius:10px;overflow:hidden;margin:6px 0;">
                    <div style="flex:1;height:300px;display:flex;flex-direction:column;gap:${GAP}px;">
                        <div style="flex:1;min-height:0;">${cell(showItems[0], false)}</div>
                        <div style="flex:1;min-height:0;">${cell(showItems[1], false)}</div>
                    </div>
                    <div style="flex:1;height:300px;display:flex;flex-direction:column;gap:${GAP}px;">
                        <div style="flex:1;min-height:0;">${cell(showItems[2], false)}</div>
                        <div style="flex:1;min-height:0;">${cell(showItems[3], false)}</div>
                        <div style="flex:1;min-height:0;">${cell(showItems[4], true)}</div>
                    </div>
                </div>`;
            }
            // legacy single image string
            return `<div style="width:100%;height:360px;border-radius:10px;overflow:hidden;margin:6px 0;"><img src="${imageData}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>`;
        }

        function renderSinglePost(post, currentUserId) {
            const avatarHtml = post.profilePicture
                ? `<img src="${post.profilePicture}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
                : `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="36" height="36" fill="none"><circle cx="32" cy="24" r="13" fill="rgba(255,255,255,0.85)"/><ellipse cx="32" cy="54" rx="22" ry="13" fill="rgba(255,255,255,0.85)"/></svg>`;
            const deleteBtn = String(post.userId) === String(currentUserId)
                ? `<button onclick="deletePost('${post.id}', this)" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:18px;padding:0 4px;" title="Delete post"><i data-lucide="trash-2" style="width:16px;height:16px;pointer-events:none;"></i></button>`
                : '';
            return `<div class="post" data-post-id="${post.id}" onclick="openPostModal(${post.id}, event)" style="cursor:pointer;">
                <div class="post-header">
                    <div class="post-author-info">
                        <div class="post-avatar">${avatarHtml}</div>
                        <div class="post-meta">
                            <p class="post-author"><strong>${post.firstName} ${post.lastName}</strong></p>
                            <p class="post-time">@${post.username} &middot; just now</p>
                        </div>
                    </div>
                    <div class="post-menu">${deleteBtn}</div>
                </div>
                <p class="post-content">${_renderMentions(post.content)}</p>
                ${_renderMediaHtml(post.imageData)}
                <div class="post-actions">
                    <span class="action-item" onclick="toggleLike(this)" data-liked="0" style="cursor:pointer;user-select:none;"><i data-lucide="heart" class="like-icon" style="width:16px;height:16px;"></i> <span class="like-count">0</span> Like</span>
                    <span class="action-item" onclick="toggleRepost(this, ${post.id})" data-reposted="0" data-post-id="${post.id}" style="cursor:pointer;user-select:none;"><i data-lucide="repeat-2" class="repost-icon" style="width:16px;height:16px;"></i> <span class="repost-count">0</span> Repost</span>
                    <span class="action-item" onclick="toggleCommentBox(this, ${post.id})" style="cursor:pointer;user-select:none;"><i data-lucide="message-circle" style="width:16px;height:16px;"></i> <span class="comment-count">0</span> Comment</span>
                </div>
                <div class="comment-box" style="display:none;padding:8px 0 4px;" data-post-id="${post.id}" data-loaded="0">
                    <input type="text" class="comment-input" placeholder="Write a comment..." style="width:100%;padding:8px 12px;border-radius:20px;border:1px solid var(--border-color);background:var(--input-bg,var(--card-bg));color:var(--text-primary);outline:none;font-size:13px;" onkeydown="if(event.key==='Enter'){submitComment(this);}">
                    <div class="comments-list" style="margin-top:6px;"></div>
                </div>
            </div>`;
        }

        let _postModalData = {};

        function closePostModalOnOverlay(event) {
            if (!event.target.closest('.post-detail-panel') && !event.target.closest('.post-detail-media')) {
                closePostModal();
            }
        }

        async function openPostModal(postId, e) {
            // Don't open if clicking action buttons, links, inputs, delete btn
            if (e && e.target.closest('.post-actions, .comment-box, button, a, input')) return;
            
            try {
                // Fetch post data
                let post = null;
                const r = await fetch(`${API_BASE_URL}/posts?userId=${localStorage.getItem('userId')||''}`);
                const posts = await r.json();
                post = posts.find(p => p.id == postId);
                if (!post) return;
                
                // Build media HTML for left side — carousel
                let mediaHtml = '';
                if (post.imageData) {
                    try {
                        const items = JSON.parse(post.imageData);
                        if (Array.isArray(items) && items.length > 0) {
                            const slides = items.map((m, i) => {
                                const media = m.type === 'video'
                                    ? `<video controls src="${m.dataUrl}" style="max-width:100%;max-height:100%;object-fit:contain;display:block;border-radius:8px;"></video>`
                                    : `<img src="${m.dataUrl}" style="max-width:100%;max-height:100%;object-fit:contain;display:block;border-radius:8px;">`;
                                return `<div class="carousel-slide" data-index="${i}" style="display:${i===0?'flex':'none'};align-items:center;justify-content:center;width:100%;height:100%;">${media}</div>`;
                            }).join('');
                            const arrows = items.length > 1 ? `
                                <button onclick="carouselPrev()" onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(0,0,0,0.35)'" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.35);border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;z-index:10;transition:background 0.2s;"><i data-lucide="chevron-left" style="width:24px;height:24px;pointer-events:none;"></i></button>
                                <button onclick="carouselNext()" onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(0,0,0,0.35)'" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.35);border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;z-index:10;transition:background 0.2s;"><i data-lucide="chevron-right" style="width:24px;height:24px;pointer-events:none;"></i></button>
                            ` : '';
                            mediaHtml = `<div id="postCarousel" data-current="0" data-total="${items.length}" style="position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;">${slides}${arrows}</div>`;
                        }
                    } catch (e) {
                        if (post.imageData && typeof post.imageData === 'string' && (post.imageData.startsWith('data:') || post.imageData.startsWith('http'))) {
                            mediaHtml = `<img src="${post.imageData}" style="max-width:100%;max-height:100%;object-fit:contain;display:block;">`;
                        }
                    }
                }
                
                // Set left side content (media)
                const contentDiv = document.getElementById('postDetailContent');
                contentDiv.innerHTML = mediaHtml || '<p style="color:var(--text-secondary);text-align:center;">No media</p>';
                
                // Set right side header (user info)
                const date = new Date(post.createdAt).toLocaleDateString();
                const headerDiv = document.getElementById('postDetailHeader');
                const userId = localStorage.getItem('userId');
                const isOwner = String(post.userId) === String(userId);
                headerDiv.innerHTML = `
                    <img src="${post.profilePicture || 'https://via.placeholder.com/36'}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23667eea%22><circle cx=%2212%22 cy=%228%22 r=%224%22/><path d=%22M12 14c-4 0-6 2-6 4v2h12v-2c0-2-2-4-6-4z%22/></svg>'">
                    <div style="flex:1;">
                        <p style="color:var(--text-primary);font-weight:600;margin:0;font-size:14px;">${post.firstName || ''} ${post.lastName || ''}</p>
                        <p style="color:var(--text-secondary);font-size:12px;margin:0;">@${post.username || 'user'}</p>
                    </div>
                    ${isOwner ? `<button onclick="deletePostFromModal('${post.id}')" style="background:transparent;border:none;cursor:pointer;color:var(--text-secondary);padding:6px;border-radius:6px;transition:all 0.2s;display:flex;align-items:center;" onmouseover="this.style.color='#e0245e';this.style.background='rgba(224,36,94,0.1)'" onmouseout="this.style.color='var(--text-secondary)';this.style.background='transparent'" title="Delete post"><i data-lucide="trash-2" style="width:16px;height:16px;"></i></button>` : ''}
                `;
                
                headerDiv.dataset.postId = post.id;
                
                // Set post text content on right side
                const textDiv = document.getElementById('postDetailText');
                if (post.content && post.content.trim()) {
                    textDiv.style.display = 'block';
                    textDiv.innerHTML = `<p style="margin:0;">${post.content}</p>`;
                } else {
                    textDiv.style.display = 'none';
                }
                
                // Set engagement stats and action buttons on same line (consolidated - 3 items: like, repost, reply)
                const statsDiv = document.getElementById('postEngagementStats');
                
                // Fetch user's reactions and counts from database
                let reactionsData = { liked: false, reposted: false, replied: false, likeCount: 0, repostCount: 0, replyCount: 0 };
                try {
                    const reactRes = await fetch(`${API_BASE_URL}/posts/${post.id}/reactions?userId=${userId}`);
                    if (reactRes.ok) {
                        reactionsData = await reactRes.json();
                    }
                } catch (e) {
                    console.error('Error fetching reactions:', e);
                }
                
                statsDiv.innerHTML = `
                    <span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;${reactionsData.liked ? 'color:#e0245e;' : ''}" onclick="togglePostLike(event, ${post.id})" class="post-like-btn" data-liked="${reactionsData.liked ? '1' : '0'}"><i data-lucide="heart" style="width:14px;height:14px;stroke-width:2;${reactionsData.liked ? 'fill:currentColor;' : ''}"></i><span class="like-count" style="font-size:12px;">${reactionsData.likeCount}</span></span>
                    <span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;" onclick="togglePostRepost(event, ${post.id})" class="post-repost-btn" data-reposted="${reactionsData.reposted ? '1' : '0'}"><i data-lucide="repeat-2" style="width:14px;height:14px;stroke-width:2;${reactionsData.reposted ? 'fill:currentColor;' : ''}"></i><span class="repost-count" style="font-size:12px;">${reactionsData.repostCount}</span></span>
                    <span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;" onclick="togglePostReply(event, ${post.id})" class="post-reply-btn" data-replied="${reactionsData.replied ? '1' : '0'}"><i data-lucide="reply" style="width:14px;height:14px;stroke-width:2;${reactionsData.replied ? 'fill:currentColor;' : ''}"></i><span class="reply-count" style="font-size:12px;">${post.commentCount || 0}</span></span>
                `;
                
                // Hide the separate action buttons section
                const actionsDiv = document.getElementById('postDetailActions');
                actionsDiv.style.display = 'none';
                
                // Store post ID for actions
                actionsDiv.dataset.postId = post.id;
                
                // Load comments
                const commentsDiv = document.getElementById('postDetailComments');
                try {
                    const commentsRes = await fetch(`${API_BASE_URL}/posts/${post.id}/comments?userId=${userId}`);
                    const comments = await commentsRes.json();
                    commentsDiv.innerHTML = comments.length === 0 
                        ? '<p style="color:var(--text-secondary);font-size:12px;text-align:center;padding:12px;">No comments yet</p>'
                        : comments.map(c => {
                            const commentTime = new Date(c.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                            const isLiked = c.liked ? true : false;
                            const likeColor = isLiked ? 'color: #e0245e;' : '';
                            const likeFill = isLiked ? 'fill: currentColor;' : '';
                            const isCommentOwner = String(c.userId) === String(userId);
                            return `
                            <div style="padding:12px 16px;border-bottom:1px solid var(--border-color);display:flex;gap:8px;flex-direction:column;">
                                <div style="display:flex;gap:8px;">
                                    <img src="${c.profilePicture || 'https://via.placeholder.com/28'}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23667eea%22><circle cx=%2212%22 cy=%228%22 r=%224%22/><path d=%22M12 14c-4 0-6 2-6 4v2h12v-2c0-2-2-4-6-4z%22/></svg>'">
                                    <div style="flex:1;">
                                        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                                            <div>
                                                <p style="margin:0;color:var(--text-primary);font-weight:600;font-size:12px;"><strong>${c.firstName} ${c.lastName}</strong></p>
                                                <p style="margin:0 0 2px 0;color:var(--text-secondary);font-size:10px;">${commentTime}</p>
                                            </div>
                                            ${isCommentOwner ? `<button onclick="deleteCommentFromModal('${c.id}', this)" style="background:transparent;border:none;cursor:pointer;color:var(--text-secondary);padding:2px 4px;border-radius:4px;transition:all 0.2s;flex-shrink:0;" onmouseover="this.style.color='#e0245e';" onmouseout="this.style.color='var(--text-secondary)';" title="Delete comment"><i data-lucide="trash-2" style="width:13px;height:13px;display:inline;"></i></button>` : ''}
                                        </div>
                                        <p style="margin:4px 0 0 0;color:var(--text-secondary);font-size:12px;">${c.content}</p>
                                        <div style="display:flex;gap:12px;margin-top:6px;font-size:11px;">
                                            <span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:3px;${likeColor}" onclick="toggleCommentLike(event, ${c.id})" data-like-count="${c.likeCount || 0}" data-liked="${isLiked ? '1' : '0'}"><i data-lucide="heart" style="width:12px;height:12px;display:inline;${likeFill}"></i><span class="comment-count">${c.likeCount || 0}</span></span>

                                            <span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:3px;color:var(--text-secondary);" onclick="replyToComment(event, '${c.firstName} ${c.lastName}', '${c.username}', ${c.id})"><i data-lucide="reply" style="width:12px;height:12px;display:inline;"></i><span class="comment-count">${c.replyCount || 0}</span></span>
                                            ${c.replyCount > 0 ? '<span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:3px;color:#667eea;font-size:10px;font-weight:500;" onclick="toggleCommentReplies(event, ' + c.id + ')"><i data-lucide="chevron-down" style="width:12px;height:12px;display:inline;"></i>View ' + c.replyCount + ' ' + (c.replyCount === 1 ? 'reply' : 'replies') + '</span>' : ''}
                                        </div>
                                    </div>
                                </div>
                                <div id="replies-${c.id}" style="display:none;margin-left:36px;border-left:2px solid var(--border-color);padding-left:8px;"></div>
                            </div>
                        `;
                        }).join('');
                } catch (e) {
                    console.error('Load comments error:', e);
                    commentsDiv.innerHTML = '';
                }
                
                // Store postId for comment submission
                document.getElementById('postDetailCommentInput').dataset.postId = post.id;
                
                // Show modal and disable page scroll
                document.getElementById('postDetailModal').style.display = 'block';
                document.body.style.overflow = 'hidden';
                const navbar = document.querySelector('.navbar-top');
                if (navbar) navbar.style.zIndex = '-1';
                // Refresh icons after DOM update
                setTimeout(() => {
                    lucide.createIcons();
                }, 0);
                
            } catch (e) {
                console.error('Open post detail error:', e);
            }
        }

        function closePostModal() {
            document.getElementById('postDetailModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            const navbar = document.querySelector('.navbar-top');
            if (navbar) navbar.style.zIndex = '';
        }

        function carouselGo(index) {
            const c = document.getElementById('postCarousel');
            if (!c) return;
            const current = parseInt(c.dataset.current);
            c.querySelectorAll('.carousel-slide')[current].style.display = 'none';
            c.querySelectorAll('.carousel-slide')[index].style.display = 'flex';
            c.dataset.current = index;
            lucide.createIcons();
        }
        function carouselPrev() {
            const c = document.getElementById('postCarousel');
            if (!c) return;
            const total = parseInt(c.dataset.total);
            const current = parseInt(c.dataset.current);
            carouselGo((current - 1 + total) % total);
        }
        function carouselNext() {
            const c = document.getElementById('postCarousel');
            if (!c) return;
            const total = parseInt(c.dataset.total);
            const current = parseInt(c.dataset.current);
            carouselGo((current + 1) % total);
        }

        async function deletePostFromModal(postId) {
            showDeleteConfirm('Delete Post?', 'This action cannot be undone. The post will be permanently deleted.', async () => {
            const userId = localStorage.getItem('userId');
            try {
                const res = await fetch(`${API_BASE_URL}/posts/${postId}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                if (res.ok) {
                    closePostModal();
                    loadPosts();
                }
            } catch (e) { console.error('Delete post error:', e); }
            });
        }

        async function deleteCommentFromModal(commentId, btn) {
            showDeleteConfirm('Delete Comment?', 'This action cannot be undone. The comment will be permanently deleted.', async () => {
            const userId = localStorage.getItem('userId');
            try {
                const res = await fetch(`${API_BASE_URL}/comments/${commentId}`, {

            const noMsg = list.querySelector('[data-no-comments]');

            const currentUserId = localStorage.getItem('userId');
            const el = document.createElement('div');
            el.dataset.commentId = commentId;
            el.style.cssText = 'margin-bottom:12px;';
            const avatarHtml = pic
                ? `<img src="${pic}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;">`
                : `<div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);flex-shrink:0;"></div>`;
            const ts = createdAt ? `<span style="font-size:11px;color:var(--text-secondary);margin-left:6px;">${timeAgo(createdAt)}</span>` : '';
            const delBtn = String(commentUserId) === String(currentUserId)
                ? `<button onclick="deleteComment('${commentId}', this)" style="background:none;border:none;cursor:pointer;color:#888;font-size:14px;padding:0 4px;margin-left:auto;" title="Delete">&times;</button>`
                : '';
            el.innerHTML = `
                <div style="display:flex;gap:8px;align-items:flex-start;">
                    ${avatarHtml}
                    <div style="flex:1;background:var(--bg-primary);border-radius:12px;padding:7px 11px;font-size:13px;color:var(--text-primary);">
                        <div style="display:flex;align-items:center;">
                            <strong>${name}</strong>${ts}
                            ${delBtn}
                        </div>
                        <div style="margin-top:2px;">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
                    </div>
                </div>
                <div style="display:flex;gap:16px;padding:4px 0 0 38px;font-size:12px;color:var(--text-secondary);">
                    <span onclick="toggleCommentLike(this)" data-liked="0" style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:3px;"><i data-lucide="heart" class="c-like-icon" style="width:14px;height:14px;"></i> <span class="c-like-count">0</span></span>
                    <span onclick="toggleCommentReply(this, '${name}')" style="cursor:pointer;user-select:none;">Reply</span>
                </div>`;
            list.appendChild(el);
            list.scrollTop = list.scrollHeight;
        }

        function toggleCommentReply(el, name) {
            const input = document.getElementById('postDetailCommentInput');
            input.value = `@${name.split(' ')[0]} `;
            input.focus();
            input.selectionStart = input.selectionEnd = input.value.length;
        }

        async function submitPostDetailComment() {
            const input = document.getElementById('postDetailCommentInput');
            const text = input.value.trim();
            if (!text) return;
            const userId = localStorage.getItem('userId');
            const postId = input.dataset.postId;
            const replyingToCommentId = input.dataset.replyingToCommentId;
            if (!userId || !postId) return;
            
            try {
                let res;
                let endpoint;
                
                // Check if replying to a specific comment
                if (replyingToCommentId) {
                    // Post reply to comment
                    endpoint = `${API_BASE_URL}/comments/${replyingToCommentId}/reply`;
                    res = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId, content: text })
                    });
                } else {
                    // Post comment to post
                    endpoint = `${API_BASE_URL}/posts/${postId}/comments`;
                    res = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId, content: text })
                    });
                }
                
                if (!res.ok) return;
                
                const data = await res.json();
                
                if (replyingToCommentId) {
                    // If replying to a comment, refresh the replies thread
                    const repliesDiv = document.getElementById(`replies-${replyingToCommentId}`);
                    if (repliesDiv) {
                        repliesDiv.dataset.loaded = 'false';
                        repliesDiv.innerHTML = '';
                        // Reload replies
                        const repliesRes = await fetch(`${API_BASE_URL}/comments/${replyingToCommentId}/replies`);
                        const replies = await repliesRes.json();
                        
                        repliesDiv.innerHTML = replies.length === 0
                            ? '<p style="color:var(--text-secondary);font-size:11px;padding:4px 0;">No replies yet</p>'
                            : replies.map(r => {
                                const replyTime = new Date(r.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                                const currentUserId = localStorage.getItem('userId');
                                const isOwner = r.user_id == currentUserId;
                                return `
                                <div style="padding:6px 8px;margin-bottom:8px;background:var(--bg-secondary);border-radius:6px;position:relative;">
                                    <div style="display:flex;gap:6px;margin-bottom:4px;justify-content:space-between;align-items:flex-start;">
                                        <div style="display:flex;gap:6px;flex:1;">
                                            <img src="${r.profilePicture || 'https://via.placeholder.com/24'}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23667eea%22><circle cx=%2212%22 cy=%228%22 r=%224%22/><path d=%22M12 14c-4 0-6 2-6 4v2h12v-2c0-2-2-4-6-4z%22/></svg>'">
                                            <div style="flex:1;">
                                                <p style="margin:0;font-size:11px;font-weight:600;color:var(--text-primary);">${r.firstName} ${r.lastName}</p>
                                                <p style="margin:0;font-size:10px;color:var(--text-secondary);">${replyTime}</p>
                                            </div>
                                        </div>
                                        ${isOwner ? `<button onclick="deleteReply(${r.id}, ${commentId})" style="padding:2px 6px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:12px;border-radius:4px;transition:all 0.2s;" onmouseover="this.style.background='var(--border-color)';this.style.color='#e0245e';" onmouseout="this.style.background='transparent';this.style.color='var(--text-secondary)';"><i data-lucide="trash-2" style="width:14px;height:14px;display:inline;"></i></button>` : ''}
                                    </div>
                                    <p style="margin:0;font-size:11px;color:var(--text-secondary);">${r.content}</p>
                                </div>
                                `;
                            }).join('');
                        
                        repliesDiv.dataset.loaded = 'true';
                        lucide.createIcons();
                    }
                    
                    // Update reply count for the parent comment
                    const commentDiv = repliesDiv.previousElementSibling;
                    if (commentDiv) {
                        const replySpan = commentDiv.querySelector('[data-reply-count]');
                        if (replySpan) {
                            const countSpan = replySpan.querySelector('.comment-count');
                            if (countSpan) countSpan.textContent = data.replyCount || 0;
                        }
                    }
                } else {
                    // If posting a top-level comment, add to comments list
                    const comment = data;
                    const commentsDiv = document.getElementById('postDetailComments');
                    const commentTime = new Date(comment.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    
                    const commentHtml = `
                        <div style="padding:12px 16px;border-bottom:1px solid var(--border-color);display:flex;gap:8px;flex-direction:column;">
                            <div style="display:flex;gap:8px;">
                                <img src="${comment.profilePicture || 'https://via.placeholder.com/28'}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23667eea%22><circle cx=%2212%22 cy=%228%22 r=%224%22/><path d=%22M12 14c-4 0-6 2-6 4v2h12v-2c0-2-2-4-6-4z%22/></svg>'">
                                <div style="flex:1;">
                                    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                                        <div>
                                            <p style="margin:0;color:var(--text-primary);font-weight:600;font-size:12px;"><strong>${comment.firstName} ${comment.lastName}</strong></p>
                                            <p style="margin:0 0 2px 0;color:var(--text-secondary);font-size:10px;">${commentTime}</p>
                                        </div>
                                        <button onclick="deleteCommentFromModal('${comment.id}', this)" style="background:transparent;border:none;cursor:pointer;color:var(--text-secondary);padding:2px 4px;border-radius:4px;transition:all 0.2s;flex-shrink:0;" onmouseover="this.style.color='#e0245e';" onmouseout="this.style.color='var(--text-secondary)';" title="Delete comment"><i data-lucide="trash-2" style="width:13px;height:13px;display:inline;"></i></button>
                                    </div>
                                    <p style="margin:4px 0 0 0;color:var(--text-secondary);font-size:12px;">${comment.content}</p>
                                    <div style="display:flex;gap:12px;margin-top:6px;font-size:11px;">
                                        <span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:3px;color:var(--text-secondary);" onclick="toggleCommentLike(event, ${comment.id})" data-like-count="${comment.likeCount || 0}" data-liked="0"><i data-lucide="heart" style="width:12px;height:12px;display:inline;"></i><span class="comment-count">${comment.likeCount || 0}</span></span>
                                        <span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:3px;color:var(--text-secondary);" onclick="replyToComment(event, '${comment.firstName} ${comment.lastName}', '${comment.username || ''}', ${comment.id})"><i data-lucide="reply" style="width:12px;height:12px;display:inline;"></i><span class="comment-count">0</span></span>
                                    </div>
                                </div>
                            </div>
                            <div id="replies-${comment.id}" style="display:none;margin-left:36px;border-left:2px solid var(--border-color);padding-left:8px;"></div>
                        </div>
                    `;
                    
                    commentsDiv.innerHTML += commentHtml;
                }
                
                input.value = '';
                delete input.dataset.replyingToCommentId;
                lucide.createIcons();
            } catch (e) {
                console.error('Submit comment error:', e);
            }
        }

        async function deleteComment(commentId, btn) {
            const userId = localStorage.getItem('userId');
            try {
                const res = await fetch(`${API_BASE_URL}/comments/${commentId}?userId=${userId}`, { method: 'DELETE' });
                if (res.ok) {
                    const el = btn.closest('[data-comment-id]');
                    if (el) el.remove();
                    const countEl = document.getElementById('modalCommentCount');
                    if (countEl) countEl.textContent = Math.max(0, parseInt(countEl.textContent) - 1);
                    const postId = _postModalData.postId;
                    const feedCard = document.querySelector(`.post[data-post-id="${postId}"] .comment-count`);
                    if (feedCard) feedCard.textContent = Math.max(0, parseInt(feedCard.textContent) - 1);
                }
            } catch (e) { console.error('Delete comment error:', e); }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closePostModal(); });

        async function deletePost(postId, btn) {
            showDeleteConfirm('Delete Post?', 'This action cannot be undone. The post will be permanently deleted.', async () => {
            const userId = localStorage.getItem('userId');
            try {
                const res = await fetch(`${API_BASE_URL}/posts/${postId}?userId=${userId}`, { method: 'DELETE' });
                if (res.ok) {
                    const feedPost = document.querySelector(`.post[data-post-id="${postId}"]`);
                    if (feedPost) feedPost.remove();
                    if (btn && btn.closest && btn.closest('.post')) btn.closest('.post').remove();
                }
            } catch (e) { console.error('Delete post error:', e); }
            });
        }

        // --- @mention autocomplete ---
        async function handleMentionInput(input) {
            const val = input.value;
            const cursor = input.selectionStart;
            const before = val.slice(0, cursor);
            const match = before.match(/@(\w*)$/);
            const dropdown = document.getElementById('mentionDropdown');
            if (!match) { dropdown.style.display = 'none'; return; }
            const query = match[1].toLowerCase();
            if (!_allUsers.length) {
                try {
                    const r = await fetch(`${API_BASE_URL}/users`);
                    if (r.ok) _allUsers = await r.json();
                } catch { return; }
            }
            const currentUserId = localStorage.getItem('userId');
            const filtered = _allUsers.filter(u =>
                String(u.id) !== String(currentUserId) &&
                (u.username.toLowerCase().includes(query) || (u.firstName + ' ' + u.lastName).toLowerCase().includes(query))
            ).slice(0, 6);
            if (!filtered.length) { dropdown.style.display = 'none'; return; }
            dropdown.style.display = 'block';
            dropdown.innerHTML = filtered.map(u =>
                `<div onclick="insertMention('${u.username}')" style="padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text-primary);display:flex;align-items:center;gap:8px;" onmouseover="this.style.background='var(--bg-primary)'" onmouseout="this.style.background='';">
                    <strong>@${u.username}</strong> <span style="color:var(--text-secondary);">${u.firstName} ${u.lastName}</span>
                </div>`
            ).join('');
        }

        function insertMention(username) {
            const input = document.getElementById('composerInput');
            const val = input.value;
            const cursor = input.selectionStart;
            const before = val.slice(0, cursor);
            const after = val.slice(cursor);
            const newBefore = before.replace(/@(\w*)$/, `@${username} `);
            input.value = newBefore + after;
            input.focus();
            input.selectionStart = input.selectionEnd = newBefore.length;
            document.getElementById('mentionDropdown').style.display = 'none';
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.composer-header')) {
                const d = document.getElementById('mentionDropdown');
                if (d) d.style.display = 'none';
            }
        });

        async function toggleLike(el) {
            const post = el.closest('.post');
            const postId = post.dataset.postId;
            const userId = localStorage.getItem('userId');
            if (!userId) return;
            
            try {
                const res = await fetch(`${API_BASE_URL}/posts/${postId}/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                const data = await res.json();
                
                // Update UI based on API response
                const icon = el.querySelector('.like-icon');
                const count = el.querySelector('.like-count');
                el.dataset.liked = data.liked ? '1' : '0';
                icon.style.fill = data.liked ? 'currentColor' : 'none';
                el.style.color = data.liked ? '#e0245e' : '';
                count.textContent = data.likeCount;
            } catch (e) {
                console.error('Like error:', e);
            }
        }

        async function toggleRepost(el, postId) {
            const userId = localStorage.getItem('userId');
            if (!userId) return;
            const count = el.querySelector('.repost-count');
            const reposted = el.dataset.reposted === '1';
            try {
                const res = await fetch(`${API_BASE_URL}/posts/${postId}/repost`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                const data = await res.json();
                el.dataset.reposted = data.reposted ? '1' : '0';
                el.style.color = data.reposted ? '#17bf63' : '';
                count.textContent = data.repostCount;
                // Show/hide repost header
                const post = el.closest('.post');
                let header = post.querySelector('.repost-header');
                const firstName = localStorage.getItem('userFirstName') || 'You';
                const lastName = localStorage.getItem('userLastName') || '';
                if (data.reposted) {
                    if (!header) {
                        header = document.createElement('div');
                        header.className = 'repost-header';
                        header.style.cssText = 'font-size:12px;color:#17bf63;padding:4px 12px 0;display:flex;align-items:center;gap:6px;';
                        post.insertBefore(header, post.firstChild);
                    }
                    header.innerHTML = `<i data-lucide="repeat-2" style="width:14px;height:14px;"></i> <span>${firstName} ${lastName} reposted</span>`;
                    lucide.createIcons();
                } else if (header) {
                    header.remove();
                }
            } catch (e) { console.error('Repost error:', e); }
        }

        async function toggleCommentBox(el, postId) {
            const post = el.closest('.post');
            const box = post.querySelector('.comment-box');
            if (!box) return;
            const isHidden = box.style.display === 'none';
            box.style.display = isHidden ? 'block' : 'none';
            if (isHidden) {
                // Load comments from DB if not yet loaded
                if (box.dataset.loaded === '0') {
                    box.dataset.loaded = '1';
                    try {
                        const res = await fetch(`${API_BASE_URL}/posts/${postId}/comments`);
                        const comments = await res.json();
                        const list = box.querySelector('.comments-list');
                        list.innerHTML = '';
                        comments.forEach(c => appendCommentToList(list, c.firstName + ' ' + c.lastName, c.content));
                    } catch (e) { console.error('Load comments error:', e); }
                }
                box.querySelector('.comment-input').focus();
            }
        }

        function appendCommentToList(list, name, text) {
            const item = document.createElement('div');
            item.style.cssText = 'padding:6px 0;font-size:13px;color:var(--text-primary);border-bottom:1px solid var(--border-color);';
            const escaped = text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
            item.innerHTML = '<strong>' + name + '</strong>: ' + escaped;
            list.appendChild(item);
        }

        async function submitComment(input) {
            const text = input.value.trim();
            if (!text) return;
            const userId = localStorage.getItem('userId');
            if (!userId) return;
            const box = input.closest('.comment-box');
            const postId = box.dataset.postId;
            try {
                const res = await fetch(`${API_BASE_URL}/posts/${postId}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, content: text })
                });
                const comment = await res.json();
                const list = box.querySelector('.comments-list');
                appendCommentToList(list, comment.firstName + ' ' + comment.lastName, comment.content);
                input.value = '';
                
                // Get updated comment count from database
                try {
                    const countRes = await fetch(`${API_BASE_URL}/posts/${postId}/comments`);
                    const comments = await countRes.json();
                    const post = box.closest('.post');
                    const countEl = post.querySelector('.comment-count');
                    if (countEl) countEl.textContent = comments.length;
                } catch (e) {
                    console.error('Error fetching updated comment count:', e);
                }
            } catch (e) { console.error('Comment error:', e); }
        }

        // Apply profile picture to composer avatar
        function applyComposerAvatar(dataUrl) {
            const el = document.getElementById('composerAvatar');
            if (el) el.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="Profile">`;
        }

        // Settings Dropdown
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsDropdown = document.getElementById('settingsDropdown');
        const themeLightDarkBtn = document.getElementById('themeLightDark');
        
        // Toggle dropdown visibility
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsDropdown.classList.toggle('show');
        });
        
        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!settingsBtn.contains(e.target) && !settingsDropdown.contains(e.target)) {
                settingsDropdown.classList.remove('show');
            }
        });
        
        // Update theme button text based on current theme
        function updateThemeButtonText() {
            const isDark = document.body.classList.contains('dark-theme');
            themeLightDarkBtn.innerHTML = isDark ? '<span><i data-lucide="sun"></i> Light Mode</span>' : '<span><i data-lucide="moon"></i> Dark Mode</span>';
            lucide.createIcons();
        }
        
        // Theme Toggle
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-theme');
        }
        updateThemeButtonText();
        
        themeLightDarkBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButtonText();
            settingsDropdown.classList.remove('show');
        });
        
        // Friends Sidebar & Messages
        const searchPeopleBtn = document.getElementById('searchPeopleBtn');
        const searchNavBtn = document.getElementById('searchNavBtn');
        const messagesSidebar = document.getElementById('messagesSidebar');
        const friendsSidebar = document.getElementById('friendsSidebar');
        const closeFriendsSidebarBtn = document.getElementById('closeFriendsSidebar');
        
        // Function to handle search navigation
        function handleSearchClick() {
            window.location.href = '../Pages/search.html';
        }
        
        // Search button in navbar navigates to instructors or students based on role
        if (searchPeopleBtn) {
            searchPeopleBtn.addEventListener('click', handleSearchClick);
        }
        
        // Search button in navigation section
        if (searchNavBtn) {
            searchNavBtn.addEventListener('click', handleSearchClick);
        }
        
        // Toggle messages sidebar between collapsed and expanded
        function toggleMessagesSidebar() {
            messagesSidebar.classList.toggle('collapsed');
        }
        
        // Close messages sidebar - collapse it
        function closeMessagesSidebar() {
            messagesSidebar.classList.add('collapsed');
        }
        
        // Close friends sidebar
        if (closeFriendsSidebarBtn) {
            closeFriendsSidebarBtn.addEventListener('click', () => {
                friendsSidebar.style.display = 'none';
            });
        }

        // Logout function
        function logout() {
            localStorage.removeItem('userId');
            localStorage.removeItem('userFirstName');
            localStorage.removeItem('userLastName');
            window.location.href = '../Pages/login.html';
        }
    </script>
<!-- Custom Delete Confirm Modal -->
<div id="deleteConfirmOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99999;display:none;align-items:center;justify-content:center;">
    <div style="background:var(--card-bg,#1e1e2e);border-radius:16px;padding:32px 28px;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
        <div style="width:64px;height:64px;background:rgba(224,36,94,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <i data-lucide="trash-2" style="width:28px;height:28px;color:#e0245e;"></i>
        </div>
        <h3 id="deleteConfirmTitle" style="margin:0 0 8px;color:var(--text-primary,#fff);font-size:20px;font-weight:700;"></h3>
        <p id="deleteConfirmMessage" style="margin:0 0 24px;color:var(--text-secondary,#aaa);font-size:14px;line-height:1.5;"></p>
        <div style="display:flex;gap:12px;justify-content:center;">
            <button onclick="dismissDeleteConfirm()" style="flex:1;padding:11px 0;border-radius:10px;border:1.5px solid var(--border-color,#333);background:transparent;color:var(--text-primary,#fff);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">Cancel</button>
            <button id="deleteConfirmBtn" style="flex:1;padding:11px 0;border-radius:10px;border:none;background:#e0245e;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='#c01d4e'" onmouseout="this.style.background='#e0245e'">Delete</button>
        </div>
    </div>
</div>
<script>
    function showDeleteConfirm(title, message, onConfirm) {
        document.getElementById('deleteConfirmTitle').textContent = title;
        document.getElementById('deleteConfirmMessage').textContent = message;
        const overlay = document.getElementById('deleteConfirmOverlay');
        overlay.style.display = 'flex';
        lucide.createIcons();
        const btn = document.getElementById('deleteConfirmBtn');
        btn.onclick = () => { dismissDeleteConfirm(); onConfirm(); };
    }
    function dismissDeleteConfirm() {
        document.getElementById('deleteConfirmOverlay').style.display = 'none';
    }
    document.getElementById('deleteConfirmOverlay').addEventListener('click', function(e) {
        if (e.target === this) dismissDeleteConfirm();
    });
</script>
