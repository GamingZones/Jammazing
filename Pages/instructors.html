<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instructors - JAMMAZING</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/home.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons());</script>
<style>
/* Lucide icon global sizing */
[data-lucide], i[data-lucide] { display:inline-flex; align-items:center; justify-content:center; }
.nav-button-icon[data-lucide], i.nav-button-icon { width:20px; height:20px; stroke-width:1.75; }
.nav-item-bottom-icon[data-lucide], i.nav-item-bottom-icon { width:22px; height:22px; stroke-width:1.75; }
.settings-btn [data-lucide], .settings-btn i { width:18px; height:18px; }
.settings-dropdown-item [data-lucide], .settings-dropdown-item i { width:14px; height:14px; vertical-align:middle; }
button > [data-lucide], button > i { pointer-events:none; }
</style></head>
<body>
    <script>
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
            document.documentElement.style.colorScheme = 'dark';
            document.body.classList.add('dark-theme');
        }
    </script>
    <!-- Top Navigation -->
    <nav class="navbar-top">
        <div class="navbar-top-container">
            <a href="../Pages/home.html" class="navbar-brand">Jammazing</a>
            <div class="navbar-search-top">
                <input type="text" class="search-input" placeholder="Search...">
                <div style="position: relative;">
                    <button class="settings-btn" id="settingsBtn" title="Settings"><i data-lucide="settings"></i></button>
                    <div class="settings-dropdown" id="settingsDropdown">
                        <button class="settings-dropdown-item" id="themeLightDark">
                            <span><i data-lucide="moon"></i> Dark Mode</span>
                        </button>
                        <button class="settings-dropdown-item" id="logoutBtn" onclick="logout()">
                            <span><i data-lucide="log-out"></i> Logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-layout">
        <!-- Left Sidebar - Profile -->
        <div class="left-sidebar">
            <a href="../Pages/profile.html" class="profile-card-line">
                <div class="profile-avatar-large"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48" fill="none"><circle cx="32" cy="24" r="13" fill="rgba(255,255,255,0.85)"/><ellipse cx="32" cy="54" rx="22" ry="13" fill="rgba(255,255,255,0.85)"/></svg></div>
                <div class="profile-info-line">
                    <h3 id="profileName" class="profile-name">Loading...</h3>
                    <p id="profileRole" class="profile-role">@username</p>
                </div>
            </a>
            <!-- Navigation Buttons -->
            <div class="navigation-buttons">
                <a href="../Pages/live-streams.html" class="nav-button">
                    <i data-lucide="video" class="nav-button-icon"></i>
                    <span class="nav-button-text">Live Streams</span>
                </a>
                <button id="searchNavBtn" class="nav-button">
                    <i data-lucide="search" class="nav-button-icon"></i>
                    <span class="nav-button-text">Search People</span>
                </button>
                <a href="../Pages/ai-learning.html" class="nav-button">
                    <i data-lucide="graduation-cap" class="nav-button-icon"></i>
                    <span class="nav-button-text">Quizzes</span>
                </a>
                <a href="../Pages/ai-jamming.html" class="nav-button">
                    <i data-lucide="music" class="nav-button-icon"></i>
                    <span class="nav-button-text">Music Mixer</span>
                </a>
            </div>
        </div>

        <!-- Center Feed - Instructors Content -->
        <div class="center-feed">
            <div class="post">
                <h3 style="margin: 0 0 16px 0; font-size: 20px; font-weight: 600;">Find Instructors</h3>
                <input type="text" id="searchInput" class="search-input" placeholder="Search instructors..." style="width: 100%; margin-bottom: 16px;" onchange="filterInstructors()">
                
                <div id="instructorsContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
                    <div style="text-align: center; padding: 20px; color: #65676b; font-size: 14px;">Loading instructors...</div>
                </div>
            </div>
        </div>

        <!-- Right Sidebar -->
        <div class="right-sidebar">
            <div class="notifications-card">
                <h3 class="sidebar-title">Notifications</h3>
                                <div class="notifications-list" id="sidebarNotifList"><div style="padding:8px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
                <a href="../Pages/notifications.html" class="view-all-link">View all notifications</a>
            </div>
    <!-- Floating Messages Sidebar -->
    <div id="messagesSidebar" class="friends-sidebar collapsed" style="cursor: pointer;">
        <div class="friends-sidebar-header" onclick="toggleMessagesSidebar()" style="cursor: pointer;">
            <h4>Messages</h4>
            <button id="closeMessagesSidebar" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary);" onclick="event.stopPropagation(); closeMessagesSidebar();"><i data-lucide="x"></i></button>
        </div>
        <div class="friends-sidebar-list" id="messagesSidebarList"><div style="padding:12px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
    </div>

        <!-- Floating Friends Sidebar -->
    <div id="friendsSidebar" class="friends-sidebar" style="display: none;">
        <div class="friends-sidebar-header">
            <h4 style="margin: 0; color: var(--text-primary);">Friends</h4>
            <button id="closeFriendsSidebar" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary);"><i data-lucide="x"></i></button>
        </div>
        <div class="friends-sidebar-list" id="friendsSidebarList"><div style="padding:8px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
            </div>
        </div>
    </div>
        </div>
    </div>

    <!-- Conversation Modal -->
    <div id="conversationModal" style="display: none; position: fixed; bottom: 24px; right: 24px; z-index: 2000; width: 340px; height: 480px;">
        <div style="background: var(--bg-secondary); border-radius: 16px; width: 100%; height: 100%; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.3); overflow: hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#667eea,#764ba2);flex-shrink:0;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div id="chatAvatar" style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;"></div>
                    <div>
                        <div id="chatTitle" style="color:white;font-weight:600;font-size:14px;">Chat</div>
                        <div id="chatUsername" style="color:rgba(255,255,255,0.7);font-size:11px;"></div>
                    </div>
                </div>
                <div style="display:flex;gap:6px;"><button id="chatProfileBtn" style="background:rgba(255,255,255,0.1);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#ccc;" title="View Profile"><i data-lucide="user" style="width:14px;height:14px;"></i></button><button onclick="closeConversationModal()" style="background:rgba(255,255,255,0.1);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#ccc;"><i data-lucide="x" style="width:14px;height:14px;"></i></button></div>
            </div>
            <div id="messagesContainer" class="messages-container" style="flex-grow:1;overflow-y:auto;padding:12px;background:var(--bg-primary);"></div>
            <div style="padding:10px 12px;border-top:1px solid var(--border-color);display:flex;gap:8px;flex-shrink:0;">
                <input type="text" id="messageInput" placeholder="Type a message..." style="flex:1;padding:8px 12px;border-radius:20px;border:1px solid var(--border-color);background:var(--bg-secondary);color:var(--text-primary);outline:none;font-size:13px;" onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" style="background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:white;padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:500;font-size:13px;">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        window.addEventListener('load', () => {
            const userFirstName = localStorage.getItem('userFirstName') || 'User';
            const userLastName = localStorage.getItem('userLastName') || 'Profile';
            
            // Ensure profile card is updated
            const profileName = document.getElementById('profileName');
            const profileRole = document.getElementById('profileRole');
            const sidebarProfileName = document.getElementById('sidebarProfileName');
            const sidebarProfileRole = document.getElementById('sidebarProfileRole');
            
            if (profileName) {
                profileName.textContent = `${userFirstName} ${userLastName}`;
            }
            if (profileRole) {
                profileRole.textContent = `@${userFirstName.toLowerCase()}${userLastName.toLowerCase()}`;
            }
            if (sidebarProfileName) {
                sidebarProfileName.textContent = `${userFirstName} ${userLastName}`;
            }
            if (sidebarProfileRole) {
                sidebarProfileRole.textContent = `@${userFirstName.toLowerCase()}${userLastName.toLowerCase()}`;
            }
            if (!localStorage.getItem('userId')) window.location.href = '../Pages/login.html';
            loadInstructors();
        });
        async function loadInstructors() {
            try {
                const response = await fetch(`${API_BASE_URL}/users?accountType=instructor`);
                if (!response.ok) throw new Error('Failed to load instructors');
                const instructors = await response.json();
                displayInstructors(instructors);
            } catch (err) {
                console.error(err);
                document.getElementById('instructorsContainer').innerHTML = '<p style="color:var(--text-secondary);text-align:center;">Could not load instructors.</p>';
            }
        }
        function displayInstructors(instructors) {
            const container = document.getElementById('instructorsContainer');
            if (!instructors.length) {
                container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;">No instructors found.</p>';
                return;
            }
            container.innerHTML = instructors.map(i => `
                <div style="border-radius: 8px; padding: 16px; background: var(--bg-secondary); border: 2px solid #667eea; box-shadow: 0 1px 2px rgba(0,0,0,0.1); text-align: center; cursor: pointer;">
                    <div style="margin-bottom: 8px;"><i data-lucide="user" style="width:48px;height:48px;color:#ccc;"></i></div>
                    <div style="font-size: 14px; font-weight: 600; color: var(--text-primary);">${i.firstName} ${i.lastName}</div>
                    <div style="font-size: 12px; color: var(--text-secondary); margin: 4px 0;">${i.instrument || 'N/A'}</div>
                    <div style="font-size: 12px; color: var(--text-secondary); margin: 4px 0;">@${i.username}</div>
                </div>
            `).join('');
        }
        function filterInstructors() { }

        // Settings Dropdown
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsDropdown = document.getElementById('settingsDropdown');
        const themeLightDarkBtn = document.getElementById('themeLightDark');
        
        // Toggle dropdown visibility
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsDropdown.classList.toggle('show');
        });
        
        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!settingsBtn.contains(e.target) && !settingsDropdown.contains(e.target)) {
                settingsDropdown.classList.remove('show');
            }
        });
        
        // Update theme button text based on current theme
        function updateThemeButtonText() {
            const isDark = document.body.classList.contains('dark-theme');
            themeLightDarkBtn.innerHTML = isDark ? '<span><i data-lucide="sun"></i> Light Mode</span>' : '<span><i data-lucide="moon"></i> Dark Mode</span>';
            lucide.createIcons();
        }
        
        // Theme Toggle
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-theme');
        }
        updateThemeButtonText();
        
        themeLightDarkBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButtonText();
            settingsDropdown.classList.remove('show');
        });
        
        // Friends Sidebar & Messages
        const searchPeopleBtn = document.getElementById('searchPeopleBtn');
        const searchNavBtn = document.getElementById('searchNavBtn');
        const messagesSidebar = document.getElementById('messagesSidebar');
        const friendsSidebar = document.getElementById('friendsSidebar');
        const closeFriendsSidebarBtn = document.getElementById('closeFriendsSidebar');
        
        // Function to handle search navigation
        function handleSearchClick() {
            window.location.href = '../Pages/search.html';
        }
        
        // Search button in navbar navigates to instructors or students based on role
        if (searchPeopleBtn) {
            searchPeopleBtn.addEventListener('click', handleSearchClick);
        }
        
        // Search button in navigation section
        if (searchNavBtn) {
            searchNavBtn.addEventListener('click', handleSearchClick);
        }
        
        // Toggle messages sidebar between collapsed and expanded
        function toggleMessagesSidebar() {
            messagesSidebar.classList.toggle('collapsed');
        }
        
        // Close messages sidebar - collapse it
        function closeMessagesSidebar() {
            messagesSidebar.classList.add('collapsed');
        }
        
        // Close friends sidebar
        if (closeFriendsSidebarBtn) {
            closeFriendsSidebarBtn.addEventListener('click', () => {
                friendsSidebar.style.display = 'none';
            });
        }
        function logout() {
            localStorage.removeItem('userId');
            localStorage.removeItem('userFirstName');
            localStorage.removeItem('userLastName');
            window.location.href = '../Pages/login.html';
        }
    </script>
</body>
</html>
