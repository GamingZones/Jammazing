<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Live - JAMMAZING</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/home.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="../js/api.js"></script>
    <script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons());</script>
<style>
/* Lucide icon global sizing */
[data-lucide], i[data-lucide] { display:inline-flex; align-items:center; justify-content:center; }
.nav-button-icon[data-lucide], i.nav-button-icon { width:20px; height:20px; stroke-width:1.75; }
.settings-btn [data-lucide], .settings-btn i { width:18px; height:18px; }
.settings-dropdown-item [data-lucide], .settings-dropdown-item i { width:14px; height:14px; vertical-align:middle; }
button > [data-lucide], button > i { pointer-events:none; }
</style>
</head>
<body>
    <script>
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
            document.documentElement.style.colorScheme = 'dark';
            document.body.classList.add('dark-theme');
        }
    </script>
    <!-- Top Navigation -->
    <nav class="navbar-top">
        <div class="navbar-top-container">
            <a href="../Pages/home.html" class="navbar-brand">Jammazing</a>
            <div class="navbar-search-top">
                <input type="text" class="search-input" placeholder="Search...">
                <div style="position: relative;">
                    <button class="settings-btn" id="settingsBtn" title="Settings"><i data-lucide="settings"></i></button>
                    <div class="settings-dropdown" id="settingsDropdown">
                        <button class="settings-dropdown-item" id="themeLightDark">
                            <span><i data-lucide="moon"></i> Dark Mode</span>
                        </button>
                        <button class="settings-dropdown-item" id="logoutBtn" onclick="logout()">
                            <span><i data-lucide="log-out"></i> Logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-layout">
        <!-- Left Sidebar - Profile -->
        <div class="left-sidebar">
            <a href="../Pages/profile.html" class="profile-card-line">
                <div class="profile-avatar-large" id="profileAvatarLarge" style="background:linear-gradient(135deg,#667eea,#764ba2);width:48px;height:48px;margin:0;flex-shrink:0;font-size:32px;"></div>
                <div class="profile-info-line">
                    <h3 id="profileName" class="profile-name">Loading...</h3>
                    <p id="profileRole" class="profile-role">@username</p>
                </div>
            </a>
            <!-- Navigation Buttons -->
            <div class="navigation-buttons">
                <a href="../Pages/live-streams.html" class="nav-button">
                    <i data-lucide="video" class="nav-button-icon"></i>
                    <span class="nav-button-text">Live Streams</span>
                </a>
                <button id="searchNavBtn" class="nav-button">
                    <i data-lucide="search" class="nav-button-icon"></i>
                    <span class="nav-button-text">Search People</span>
                </button>
                <a href="../Pages/ai-learning.html" class="nav-button">
                    <i data-lucide="graduation-cap" class="nav-button-icon"></i>
                    <span class="nav-button-text">Quizzes</span>
                </a>
                <a href="../Pages/ai-jamming.html" class="nav-button">
                    <i data-lucide="music" class="nav-button-icon"></i>
                    <span class="nav-button-text">Music Mixer</span>
                </a>
            </div>
        </div>

        <!-- Center Feed - Go Live Content -->
        <div class="center-feed">
            <div class="post">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <i data-lucide="radio" style="width:20px;height:20px;color:#e0245e;"></i>
                        <h3 style="margin: 0; font-size: 20px; font-weight: 600;">Go Live</h3>
                    </div>
                    <button type="button" onclick="history.back()" style="background: rgba(255,255,255,0.1); border: none; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-secondary);" title="Go back"><i data-lucide="arrow-left" style="width:18px;height:18px;"></i></button>
                </div>
                <form onsubmit="handleGoLive(event)">
                    <div style="margin-bottom: 12px;">
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">Stream Title *</label>
                        <input id="streamTitle" type="text" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" placeholder="e.g., Guitar Basics for Beginners" required>
                    </div>

                    <div style="margin-bottom: 12px;">
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">Stream Description</label>
                        <textarea id="streamDescription" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit;" placeholder="Tell your viewers what to expect..."></textarea>
                    </div>

                    <div style="margin-bottom: 16px;">
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">Category *</label>
                        <select id="streamCategory" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" required>
                            <option value="">Select a category</option>
                            <option value="guitar">🎸 Guitar</option>
                            <option value="piano">🎹 Piano</option>
                            <option value="vocals">🎤 Vocals</option>
                            <option value="drums">🥁 Drums</option>
                            <option value="music-theory">📚 Music Theory</option>
                            <option value="production">🎧 Music Production</option>
                            <option value="other">✨ Other</option>
                        </select>
                    </div>

                    <button type="submit" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px;"><i data-lucide="radio" style="width:16px;height:16px;"></i>Start Streaming</button>
                </form>
            </div>
        </div>

        <!-- Right Sidebar -->
        <div class="right-sidebar">
            <div class="notifications-card">
                <h3 class="sidebar-title">Notifications</h3>
                <div class="notifications-list" id="sidebarNotifList"><div style="padding:8px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
                <a href="../Pages/notifications.html" class="view-all-link">View all notifications</a>
            </div>
    <!-- Floating Messages Sidebar -->
            <div id="messagesSidebar" class="friends-sidebar collapsed" style="cursor: pointer;">
        <div class="friends-sidebar-header" onclick="toggleMessagesSidebar()" style="cursor: pointer;">
            <h4>Messages</h4>
            <button id="closeMessagesSidebar" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary);" onclick="event.stopPropagation(); closeMessagesSidebar();"><i data-lucide="x" style="width:18px;height:18px;"></i></button>
        </div>
        <div class="friends-sidebar-list" id="messagesSidebarList"><div style="padding:12px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
    </div>
    <!-- Floating Friends Sidebar -->
    <div id="friendsSidebar" class="friends-sidebar" style="display: none;">
        <div class="friends-sidebar-header">
            <h4 style="margin: 0; color: var(--text-primary);">Friends</h4>
            <button id="closeFriendsSidebar" style="background: none; border: none; cursor: pointer; color: var(--text-secondary);"><i data-lucide="x" style="width:18px;height:18px;"></i></button>
        </div>
        <div class="friends-sidebar-list">
            <div class="friend-item-floating" onclick="openFriendConversation('1', 'Sarah Chen')">
                <div class="friend-avatar-floating" style="background:linear-gradient(135deg,#667eea,#764ba2);"><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' width='100%' height='100%' fill='none'><circle cx='32' cy='24' r='13' fill='rgba(255,255,255,0.85)'/><ellipse cx='32' cy='54' rx='22' ry='13' fill='rgba(255,255,255,0.85)'/></svg></div>
                <div class="friend-info">
                    <div class="friend-name-floating">Sarah Chen</div>
                    <div class="friend-status">Online</div>
                </div>
            </div>
            <div class="friend-item-floating" onclick="openFriendConversation('2', 'Marcus Taylor')">
                <div class="friend-avatar-floating" style="background:linear-gradient(135deg,#667eea,#764ba2);"><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' width='100%' height='100%' fill='none'><circle cx='32' cy='24' r='13' fill='rgba(255,255,255,0.85)'/><ellipse cx='32' cy='54' rx='22' ry='13' fill='rgba(255,255,255,0.85)'/></svg></div>
                <div class="friend-info">
                    <div class="friend-name-floating">Marcus Taylor</div>
                    <div class="friend-status">Online</div>
                </div>
            </div>
            <div class="friend-item-floating" onclick="openFriendConversation('3', 'Emma Davis')">
                <div class="friend-avatar-floating" style="background:linear-gradient(135deg,#667eea,#764ba2);"><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' width='100%' height='100%' fill='none'><circle cx='32' cy='24' r='13' fill='rgba(255,255,255,0.85)'/><ellipse cx='32' cy='54' rx='22' ry='13' fill='rgba(255,255,255,0.85)'/></svg></div>
                <div class="friend-info">
                    <div class="friend-name-floating">Emma Davis</div>
                    <div class="friend-status">Online</div>
                </div>
            </div>
        </div>
    </div>
        </div>
    </div>

    <!-- Camera Modal -->
    <div id="cameraModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.8); z-index: 2000; padding: 20px;">
        <div style="background: var(--bg-secondary); border-radius: 15px; width: 90%; max-width: 800px; height: 90%; margin: 20px auto; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.3);">
            <!-- Header -->
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border-color);">
                <h6 style="margin: 0; color: var(--text-primary);"><i data-lucide="camera" style="width:16px;height:16px;margin-right:8px;display:inline;"></i>Camera Preview</h6>
                <button onclick="closeCameraModal()" style="background: none; border: none; cursor: pointer; color: var(--text-secondary);"><i data-lucide="x" style="width:20px;height:20px;"></i></button>
            </div>

            <!-- Video Feed -->
            <div style="flex-grow: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; background-color: #000;">
                <video id="cameraFeed" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;"></video>
            </div>

            <!-- Controls -->
            <div style="padding: 15px; border-top: 1px solid var(--border-color); display: flex; justify-content: center; gap: 10px;">
                <button onclick="stopCamera()" style="background: #e74c3c; border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 6px;"><i data-lucide="x" style="width:16px;height:16px;"></i>Stop Camera</button>
                <button onclick="proceedToStreaming()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 6px;"><i data-lucide="check" style="width:16px;height:16px;"></i>Proceed to Streaming</button>
            </div>
        </div>
    </div>

    <!-- Conversation Modal -->
    <div id="conversationModal" style="display: none; position: fixed; bottom: 24px; right: 24px; z-index: 2000; width: 340px; height: 480px;">
        <div style="background: var(--bg-secondary); border-radius: 16px; width: 100%; height: 100%; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.3); overflow: hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#667eea,#764ba2);flex-shrink:0;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div id="chatAvatar" style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;"></div>
                    <div>
                        <div id="chatTitle" style="color:white;font-weight:600;font-size:14px;">Chat</div>
                        <div id="chatUsername" style="color:rgba(255,255,255,0.7);font-size:11px;"></div>
                    </div>
                </div>
                <div style="display:flex;gap:6px;"><button id="chatProfileBtn" style="background:rgba(255,255,255,0.1);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#ccc;" title="View Profile"><i data-lucide="user" style="width:14px;height:14px;"></i></button><button onclick="closeConversationModal()" style="background:rgba(255,255,255,0.1);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#ccc;"><i data-lucide="x" style="width:14px;height:14px;"></i></button></div>
            </div>
            <div id="messagesContainer" class="messages-container" style="flex-grow:1;overflow-y:auto;padding:12px;background:var(--bg-primary);"></div>
            <div style="padding:10px 12px;border-top:1px solid var(--border-color);display:flex;gap:8px;flex-shrink:0;">
                <input type="text" id="messageInput" placeholder="Type a message..." style="flex:1;padding:8px 12px;border-radius:20px;border:1px solid var(--border-color);background:var(--bg-secondary);color:var(--text-primary);outline:none;font-size:13px;" onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" style="background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:white;padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:500;font-size:13px;">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            const userId = localStorage.getItem('userId');
            const userFirstName = localStorage.getItem('userFirstName') || 'User';
            const userLastName = localStorage.getItem('userLastName') || 'Profile';
            const profilePictureKey = `profilePicture_${userId}`;
            const profilePicture = localStorage.getItem(profilePictureKey);
            
            // Load profile picture
            const profileAvatarLarge = document.getElementById('profileAvatarLarge');
            if (profileAvatarLarge && profilePicture) {
                profileAvatarLarge.innerHTML = `<img style="width:100%;height:100%;border-radius:50%;object-fit:cover;" src="${profilePicture}" onerror="this.parentElement.textContent='👤'">`;
            }
            
            // Ensure profile card is updated
            const profileName = document.getElementById('profileName');
            const profileRole = document.getElementById('profileRole');
            const sidebarProfileName = document.getElementById('sidebarProfileName');
            const sidebarProfileRole = document.getElementById('sidebarProfileRole');
            
            if (profileName) {
                profileName.textContent = `${userFirstName} ${userLastName}`;
            }
            if (profileRole) {
                profileRole.textContent = `@${userFirstName.toLowerCase()}${userLastName.toLowerCase()}`;
            }
            if (sidebarProfileName) {
                sidebarProfileName.textContent = `${userFirstName} ${userLastName}`;
            }
            if (sidebarProfileRole) {
                sidebarProfileRole.textContent = `@${userFirstName.toLowerCase()}${userLastName.toLowerCase()}`;
            }
            if (!localStorage.getItem('userId')) window.location.href = '../Pages/login.html';
        });

        function handleGoLive(event) {
            event.preventDefault();
            const title = document.getElementById('streamTitle').value;
            const description = document.getElementById('streamDescription').value;
            const category = document.getElementById('streamCategory').value;
            
            // Store stream data in localStorage
            localStorage.setItem('currentStreamTitle', title);
            localStorage.setItem('currentStreamDescription', description);
            localStorage.setItem('currentStreamCategory', category);
            localStorage.setItem('streamStartTime', new Date().toISOString());
            
            // Redirect directly to streaming page
            window.location.href = '../Pages/streaming.html';
        }

        // Camera functions
        let cameraStream = null;

        async function openCamera() {
            try {
                // Request camera access
                const constraints = {
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'user'
                    },
                    audio: true // Also request microphone access
                };

                cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // Display the video feed
                const videoElement = document.getElementById('cameraFeed');
                videoElement.srcObject = cameraStream;
                
                // Show the camera modal
                document.getElementById('cameraModal').style.display = 'block';
            } catch (error) {
                console.error('Error accessing camera:', error);
                alert('Unable to access camera. Please check permissions or try another device.\n\nError: ' + error.message);
            }
        }

        function stopCamera() {
            if (cameraStream) {
                // Stop all tracks
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            closeCameraModal();
        }

        function closeCameraModal() {
            document.getElementById('cameraModal').style.display = 'none';
            stopCamera();
        }

        function proceedToStreaming() {
            // Close the modal but keep the camera stream active
            document.getElementById('cameraModal').style.display = 'none';
            // Redirect to streaming page
            window.location.href = '../Pages/streaming.html';
        }

        // Settings Dropdown
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsDropdown = document.getElementById('settingsDropdown');
        const themeLightDarkBtn = document.getElementById('themeLightDark');
        
        // Toggle dropdown visibility
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsDropdown.classList.toggle('show');
        });
        
        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!settingsBtn.contains(e.target) && !settingsDropdown.contains(e.target)) {
                settingsDropdown.classList.remove('show');
            }
        });
        
        // Update theme button text based on current theme
        function updateThemeButtonText() {
            const isDark = document.body.classList.contains('dark-theme');
            themeLightDarkBtn.innerHTML = isDark ? '<span>🌙 Light Mode</span>' : '<span>🌙 Dark Mode</span>';
        }
        
        // Theme Toggle
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-theme');
        }
        updateThemeButtonText();
        
        themeLightDarkBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButtonText();
            settingsDropdown.classList.remove('show');
        });
        
        
        // Friends Sidebar
        const searchPeopleBtn = document.getElementById('searchPeopleBtn');
        const searchNavBtn = document.getElementById('searchNavBtn');
        const friendsSidebar = document.getElementById('friendsSidebar');
        
        // Function to handle search navigation
        function handleSearchClick() {
            window.location.href = '../Pages/search.html';
        }
        
        // Search button in navbar navigates to instructors or students based on role
        if (searchPeopleBtn) {
            searchPeopleBtn.addEventListener('click', handleSearchClick);
        }
        
        // Search button in navigation section
        if (searchNavBtn) {
            searchNavBtn.addEventListener('click', handleSearchClick);
        }
        
        const messagesSidebar = document.getElementById('messagesSidebar');
        
        // Toggle messages sidebar between collapsed and expanded
        function toggleMessagesSidebar() {
            messagesSidebar.classList.toggle('collapsed');
        }
        
        // Close messages sidebar - collapse it
        function closeMessagesSidebar() {
            messagesSidebar.classList.add('collapsed');
        }
        
        // Close friends sidebar
        const closeFriendsSidebarBtn = document.getElementById('closeFriendsSidebar');
        if (closeFriendsSidebarBtn) {
            closeFriendsSidebarBtn.addEventListener('click', () => {
                friendsSidebar.style.display = 'none';
            });
        }
        
        function openFriendConversation(friendId, friendName) {
            window.location.href = '../Pages/messages.html';
        }
    </script>
</body>
</html>
