<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Quiz - JAMMAZING</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/home.css">
    <script src="../js/api.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons());</script>
<style>
/* Lucide icon global sizing */
[data-lucide], i[data-lucide] { display:inline-flex; align-items:center; justify-content:center; }
.nav-button-icon[data-lucide], i.nav-button-icon { width:20px; height:20px; stroke-width:1.75; }
.nav-item-bottom-icon[data-lucide], i.nav-item-bottom-icon { width:22px; height:22px; stroke-width:1.75; }
.settings-btn [data-lucide], .settings-btn i { width:18px; height:18px; }
.settings-dropdown-item [data-lucide], .settings-dropdown-item i { width:14px; height:14px; vertical-align:middle; }
button > [data-lucide], button > i { pointer-events:none; }
</style></head>
<body>
    <script>
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
            document.documentElement.style.colorScheme = 'dark';
            document.body.classList.add('dark-theme');
        }
    </script>
    <!-- Top Navigation -->
    <nav class="navbar-top">
        <div class="navbar-top-container">
            <a href="../Pages/home.html" class="navbar-brand">Jammazing</a>
            <div class="navbar-search-top">
                <input type="text" class="search-input" placeholder="Search...">
                <div style="position: relative;">
                    <button class="settings-btn" id="settingsBtn" title="Settings"><i data-lucide="settings"></i></button>
                    <div class="settings-dropdown" id="settingsDropdown">
                        <button class="settings-dropdown-item" id="themeLightDark">
                            <span><i data-lucide="moon"></i> Dark Mode</span>
                        </button>
                        <button class="settings-dropdown-item" id="logoutBtn" onclick="logout()">
                            <span><i data-lucide="log-out"></i> Logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-layout">
        <!-- Left Sidebar - Profile -->
        <div class="left-sidebar">
            <a href="../Pages/profile.html" class="profile-card-line">
                <div class="profile-avatar-large"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48" fill="none"><circle cx="32" cy="24" r="13" fill="rgba(255,255,255,0.85)"/><ellipse cx="32" cy="54" rx="22" ry="13" fill="rgba(255,255,255,0.85)"/></svg></div>
                <div class="profile-info-line">
                    <h3 id="profileName" class="profile-name">Loading...</h3>
                    <p id="profileRole" class="profile-role">@username</p>
                </div>
            </a>
            <!-- Navigation Buttons -->
            <div class="navigation-buttons">
                <a href="../Pages/live-streams.html" class="nav-button">
                    <i data-lucide="video" class="nav-button-icon"></i>
                    <span class="nav-button-text">Live Streams</span>
                </a>
                <button id="searchNavBtn" class="nav-button">
                    <i data-lucide="search" class="nav-button-icon"></i>
                    <span class="nav-button-text">Search People</span>
                </button>
                <a href="../Pages/ai-learning.html" class="nav-button">
                    <i data-lucide="graduation-cap" class="nav-button-icon"></i>
                    <span class="nav-button-text">Quizzes</span>
                </a>
                <a href="../Pages/ai-jamming.html" class="nav-button">
                    <i data-lucide="music" class="nav-button-icon"></i>
                    <span class="nav-button-text">Music Mixer</span>
                </a>
            </div>
        </div>

        <!-- Center Feed - Create Quiz Content -->
        <div class="center-feed">
            <div class="post">
                <h3 style="margin: 0 0 16px 0; font-size: 20px; font-weight: 600;">Create Quiz</h3>
                <form onsubmit="createQuiz(event)">
                    <div style="margin-bottom: 12px;">
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">Title *</label>
                        <input type="text" id="quizTitle" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" placeholder="e.g., Jazz Basics" required>
                    </div>

                    <div style="margin-bottom: 12px;">
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">Quiz Type *</label>
                        <select id="quizType" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" required onchange="handleQuizTypeChange(this.value)">
                            <option value="">Select quiz type</option>
                            <option value="general">General Music Knowledge</option>
                            <option value="instruments">Instruments Based</option>
                        </select>
                    </div>

                    <div id="instrumentsSection" style="margin-bottom: 16px; display: none;">
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px;">Instruments</label>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px;">
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;"><input type="checkbox" name="quizInstrument" value="piano"><span>Piano</span></label>
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;"><input type="checkbox" name="quizInstrument" value="guitar"><span>Guitar</span></label>
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;"><input type="checkbox" name="quizInstrument" value="bass"><span>Bass</span></label>
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;"><input type="checkbox" name="quizInstrument" value="drums"><span>Drums</span></label>
                        </div>
                    </div>

                    <div style="margin-bottom: 12px;">
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">Difficulty Level *</label>
                        <select id="quizDifficulty" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" required>
                            <option value="">Select difficulty</option>
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 12px;">
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">Topic / Prompt (Optional)</label>
                        <input type="text" id="quizTopicPrompt" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" placeholder="e.g., Chord progressions in jazz">
                    </div>

                    <div style="margin-bottom: 12px;">
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">Number of Questions *</label>
                        <select id="quizQuestions" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" required>
                            <option value="5">5 Questions</option>
                            <option value="10">10 Questions</option>
                            <option value="15">15 Questions</option>
                            <option value="20">20 Questions</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 16px;">
                        <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px;">Quiz Timer *</label>
                        <select id="quizTimer" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;" required>
                            <option value="3">3 Minutes</option>
                            <option value="5" selected>5 Minutes</option>
                            <option value="10">10 Minutes</option>
                        </select>
                    </div>

                    <button type="submit" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-right: 10px;">Create Quiz</button>
                    <button type="button" style="background: #ddd; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; color: #050505;" onclick="window.location.href='../Pages/ai-learning.html'">Cancel</button>
                </form>
            </div>
        </div>

        <!-- Right Sidebar -->
        <div class="right-sidebar">
            <div class="notifications-card">
                <h3 class="sidebar-title">Notifications</h3>
                                <div class="notifications-list" id="sidebarNotifList"><div style="padding:8px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
                <a href="../Pages/notifications.html" class="view-all-link">View all notifications</a>
            </div>
    <!-- Floating Messages Sidebar -->
    <div id="messagesSidebar" class="friends-sidebar collapsed" style="cursor: pointer;">
        <div class="friends-sidebar-header" onclick="toggleMessagesSidebar()" style="cursor: pointer;">
            <h4>Messages</h4>
            <button id="closeMessagesSidebar" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary);" onclick="event.stopPropagation(); closeMessagesSidebar();"><i data-lucide="x"></i></button>
        </div>
        <div class="friends-sidebar-list" id="messagesSidebarList"><div style="padding:12px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
    </div>

        <!-- Floating Friends Sidebar -->
    <div id="friendsSidebar" class="friends-sidebar" style="display: none;">
        <div class="friends-sidebar-header">
            <h4 style="margin: 0; color: var(--text-primary);">Friends</h4>
            <button id="closeFriendsSidebar" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary);"><i data-lucide="x"></i></button>
        </div>
        <div class="friends-sidebar-list" id="friendsSidebarList"><div style="padding:8px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
            </div>
        </div>
    </div>
        </div>
    </div>

    <!-- Conversation Modal -->
    <div id="conversationModal" style="display: none; position: fixed; bottom: 24px; right: 24px; z-index: 2000; width: 340px; height: 480px;">
        <div style="background: var(--bg-secondary); border-radius: 16px; width: 100%; height: 100%; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.3); overflow: hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#667eea,#764ba2);flex-shrink:0;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div id="chatAvatar" style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;"></div>
                    <div>
                        <div id="chatTitle" style="color:white;font-weight:600;font-size:14px;">Chat</div>
                        <div id="chatUsername" style="color:rgba(255,255,255,0.7);font-size:11px;"></div>
                    </div>
                </div>
                <div style="display:flex;gap:6px;"><button id="chatProfileBtn" style="background:rgba(255,255,255,0.1);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#ccc;" title="View Profile"><i data-lucide="user" style="width:14px;height:14px;"></i></button><button onclick="closeConversationModal()" style="background:rgba(255,255,255,0.1);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#ccc;"><i data-lucide="x" style="width:14px;height:14px;"></i></button></div>
            </div>
            <div id="messagesContainer" class="messages-container" style="flex-grow:1;overflow-y:auto;padding:12px;background:var(--bg-primary);"></div>
            <div style="padding:10px 12px;border-top:1px solid var(--border-color);display:flex;gap:8px;flex-shrink:0;">
                <input type="text" id="messageInput" placeholder="Type a message..." style="flex:1;padding:8px 12px;border-radius:20px;border:1px solid var(--border-color);background:var(--bg-secondary);color:var(--text-primary);outline:none;font-size:13px;" onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" style="background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:white;padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:500;font-size:13px;">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function handleQuizTypeChange(value) {
            const section = document.getElementById('instrumentsSection');
            section.style.display = value === 'instruments' ? 'block' : 'none';
        }

        function getSelectedInstruments() {
            return Array.from(document.querySelectorAll('input[name="quizInstrument"]:checked')).map(el => el.value);
        }

        async function createQuiz(event) {
            event.preventDefault();

            const title = document.getElementById('quizTitle').value.trim();
            const quizType = document.getElementById('quizType').value;
            const difficultyLevel = document.getElementById('quizDifficulty').value;
            const questionCount = document.getElementById('quizQuestions').value;
            const topicPrompt = document.getElementById('quizTopicPrompt')?.value.trim() || '';
            const timeLimit = document.getElementById('quizTimer')?.value || 5;
            const selectedInstruments = getSelectedInstruments();
            const creatorId = localStorage.getItem('userId');

            console.log('📝 Form data captured:', {
                title,
                quizType,
                difficultyLevel,
                questionCount,
                topicPrompt,
                selectedInstruments,
                creatorId,
                timeLimit
            });

            if (!title || !quizType || !difficultyLevel) {
                alert('Please fill in all required fields.');
                return;
            }

            if (quizType === 'instruments' && selectedInstruments.length === 0) {
                alert('Please select at least one instrument for instruments-based quiz.');
                return;
            }

            try {
                const generateResponse = await fetch(`${API_BASE_URL}/quizzes/generate-ai`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, quizType, difficultyLevel, questionCount, topicPrompt, selectedInstruments })
                });

                const generateData = await generateResponse.json();
                if (!generateResponse.ok) throw new Error(generateData.error || 'Failed to generate quiz');

                console.log('✅ Generated quiz:', generateData.quiz);

                const saveResponse = await fetch(`${API_BASE_URL}/quizzes/save-with-questions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({
                        title,
                        description: topicPrompt || `${quizType} quiz about ${title}`,
                        creatorId,
                        quizType,
                        difficultyLevel,
                        timeLimit: parseInt(timeLimit),
                        totalQuestions: generateData.quiz.totalQuestions,
                        questions: generateData.quiz.questions,
                        isPublished: 1
                    })
                });

                const saveData = await saveResponse.json();
                console.log('💾 Save response:', saveData);
                if (!saveResponse.ok) throw new Error(saveData.error || 'Failed to save quiz');

                // Cache the new quiz in localStorage
                const userId = localStorage.getItem('userId');
                const newQuiz = {
                    id: saveData.quizId,
                    title: title,
                    description: topicPrompt || `${quizType} quiz about ${title}`,
                    creatorId: userId,
                    quizType: quizType,
                    difficultyLevel: difficultyLevel,
                    timeLimit: parseInt(timeLimit),
                    totalQuestions: generateData.quiz.totalQuestions,
                    questions: generateData.quiz.questions,
                    creatorName: `${localStorage.getItem('userFirstName')} ${localStorage.getItem('userLastName')}`
                };
                
                // Add to localStorage cache
                const cachedQuizzes = JSON.parse(localStorage.getItem(`userQuizzes_${userId}`) || '[]');
                cachedQuizzes.push(newQuiz);
                localStorage.setItem(`userQuizzes_${userId}`, JSON.stringify(cachedQuizzes));
                console.log('💾 Cached new quiz to localStorage');

                renderGeneratedQuiz(generateData.quiz);

                const successMsg = document.createElement('div');
                successMsg.style.cssText = 'position: fixed; top: 20px; right: 20px; background: #28a745; color: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 9999; font-weight: 500;';
                successMsg.textContent = 'Quiz saved successfully! Redirecting...';
                document.body.appendChild(successMsg);
                setTimeout(() => { window.location.href = '../Pages/ai-learning.html'; }, 2000);
            } catch (error) {
                console.error('Create quiz error:', error);
                alert(error.message || 'Failed to create quiz');
            }
        }

        function renderGeneratedQuiz(quiz) {
            const container = document.getElementById('generatedResults');
            if (!container || !quiz) return;
            const questionsHtml = (quiz.questions || []).map((q, index) => `
                <div class="question-item">
                    <div class="question-title">${index + 1}. ${q.question}</div>
                    <ol class="option-list">${(q.options || []).map(opt => `<li>${opt}</li>`).join('')}</ol>
                    <span class="answer-pill">Answer: ${q.answer}</span>
                </div>`).join('');
            container.innerHTML = `
                <h4 style="margin-bottom: 10px;">AI Generated Quiz</h4>
                <p style="margin-bottom: 14px; color: #555;"><strong>${quiz.title}</strong> • ${quiz.difficultyLevel} • ${quiz.quizType} • ${quiz.totalQuestions} questions</p>
                ${questionsHtml}`;
            container.style.display = 'block';
        }

        window.addEventListener('load', () => {
            if (!localStorage.getItem('userId')) {
                window.location.href = '../Pages/login.html';
                return;
            }
            
            // Initialize form fields
            const form = document.querySelector('form');
            if (form) {
                form.reset();
            }
            document.getElementById('quizTitle').value = '';
            document.getElementById('quizType').value = '';
            document.getElementById('quizDifficulty').value = '';
            document.getElementById('quizQuestions').value = '5';
            document.getElementById('quizTimer').value = '5';
            document.getElementById('quizTopicPrompt').value = '';
            document.querySelectorAll('input[name="quizInstrument"]').forEach(el => el.checked = false);
            
            const userFirstName = localStorage.getItem('userFirstName') || 'User';
            const userLastName = localStorage.getItem('userLastName') || 'Profile';
            const profileName = document.getElementById('profileName');
            const profileRole = document.getElementById('profileRole');
            if (profileName) profileName.textContent = `${userFirstName} ${userLastName}`;
            if (profileRole) profileRole.textContent = `@${userFirstName.toLowerCase()}${userLastName.toLowerCase()}`;
        });

        // Settings Dropdown
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsDropdown = document.getElementById('settingsDropdown');
        const themeLightDarkBtn = document.getElementById('themeLightDark');

        settingsBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsDropdown.classList.toggle('show'); });
        document.addEventListener('click', (e) => {
            if (!settingsBtn.contains(e.target) && !settingsDropdown.contains(e.target)) settingsDropdown.classList.remove('show');
        });

        function updateThemeButtonText() {
            const isDark = document.body.classList.contains('dark-theme');
            themeLightDarkBtn.innerHTML = isDark ? '<span><i data-lucide="sun"></i> Light Mode</span>' : '<span><i data-lucide="moon"></i> Dark Mode</span>';
            lucide.createIcons();
        }
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') document.body.classList.add('dark-theme');
        updateThemeButtonText();

        themeLightDarkBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButtonText();
            settingsDropdown.classList.remove('show');
        });

        const searchNavBtn = document.getElementById('searchNavBtn');
        const messagesSidebar = document.getElementById('messagesSidebar');
        const friendsSidebar = document.getElementById('friendsSidebar');
        const closeFriendsSidebarBtn = document.getElementById('closeFriendsSidebar');

        function handleSearchClick() {
            window.location.href = '../Pages/search.html';
        }
        if (searchNavBtn) searchNavBtn.addEventListener('click', handleSearchClick);

        function toggleMessagesSidebar() { messagesSidebar.classList.toggle('collapsed'); }
        function closeMessagesSidebar() { messagesSidebar.classList.add('collapsed'); }

        if (closeFriendsSidebarBtn) {
            closeFriendsSidebarBtn.addEventListener('click', () => { friendsSidebar.style.display = 'none'; });
        }

        function logout() {
            localStorage.removeItem('userId');
            localStorage.removeItem('userFirstName');
            localStorage.removeItem('userLastName');
            window.location.href = '../Pages/login.html';
        }
    </script>
</body>
</html>
