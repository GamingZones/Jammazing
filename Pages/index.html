<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JAMMAZING - Your Music Learning Companion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .landing-container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
        }
        
        .landing-header {
            margin-bottom: 40px;
        }
        
        .landing-header h1 {
            font-size: 3.5rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .landing-header p {
            font-size: 1.3rem;
            color: #666;
            margin-bottom: 20px;
        }
        
        .landing-description {
            font-size: 1rem;
            color: #777;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        
        .landing-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-primary-landing {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }
        
        .btn-primary-landing:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
            text-decoration: none;
        }
        
        .btn-secondary-landing {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-block;
            font-weight: 600;
        }
        
        .btn-secondary-landing:hover {
            background: #667eea;
            color: white;
            text-decoration: none;
        }
        
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner"></div>
            <p style="margin-top: 20px; color: #667eea;">Loading...</p>
        </div>
        
        <div class="landing-header" id="landingContent">
            <h1>JAMMAZING</h1>
            <p>Your Music Learning Companion</p>
        </div>
        
        <div class="landing-description" id="landingDescription">
            <p>Learn, jam, and collaborate with musicians from around the world. Master your instrument, improve your skills, and have fun!</p>
        </div>
        
        <div class="landing-buttons" id="landingButtons">
            <a href="./login.html" class="btn-primary-landing">Sign In</a>
            <a href="./register.html" class="btn-secondary-landing">Create Account</a>
        </div>
    </div>

    <script>
        // Automatically redirect to login
        window.location.href = '/Pages/login.html';
    </script>
</body>
</html>
