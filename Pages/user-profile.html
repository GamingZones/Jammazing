<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile - JAMMAZING</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user-profile.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons());</script>
<style>
/* Lucide icon global sizing */
[data-lucide], i[data-lucide] { display:inline-flex; align-items:center; justify-content:center; }
.nav-button-icon[data-lucide], i.nav-button-icon { width:20px; height:20px; stroke-width:1.75; }
.nav-item-bottom-icon[data-lucide], i.nav-item-bottom-icon { width:22px; height:22px; stroke-width:1.75; }
.settings-btn [data-lucide], .settings-btn i { width:18px; height:18px; }
.settings-dropdown-item [data-lucide], .settings-dropdown-item i { width:14px; height:14px; vertical-align:middle; }
button > [data-lucide], button > i { pointer-events:none; }
</style></head>
<body>
    <script>
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
            document.documentElement.style.colorScheme = 'dark';
            document.body.classList.add('dark-theme');
        }
    </script>
    <!-- Top Navigation -->
    <nav class="navbar-top">
        <div class="navbar-top-container">
            <a href="../Pages/home.html" class="navbar-brand">Jammazing</a>
            <div class="navbar-search-top">
                <input type="text" class="search-input" placeholder="Search...">
                <div style="position: relative;">
                    <button class="settings-btn" id="settingsBtn" title="Settings"><i data-lucide="settings"></i></button>
                    <div class="settings-dropdown" id="settingsDropdown">
                        <button class="settings-dropdown-item" id="themeLightDark">
                            <span><i data-lucide="moon" style="width:14px;height:14px;"></i> Dark Mode</span>
                        </button>
                        <button class="settings-dropdown-item" id="logoutBtn" onclick="logout()">
                            <span><i data-lucide="log-out" style="width:14px;height:14px;"></i> Logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-layout">
        <!-- Left Sidebar - Profile -->
        <div class="left-sidebar">
            <a href="../Pages/profile.html" class="profile-card-line">
                <div class="profile-avatar-large"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48" fill="none"><circle cx="32" cy="24" r="13" fill="rgba(255,255,255,0.85)"/><ellipse cx="32" cy="54" rx="22" ry="13" fill="rgba(255,255,255,0.85)"/></svg></div>
                <div class="profile-info-line">
                    <h3 id="profileName" class="profile-name">Loading...</h3>
                    <p id="profileRole" class="profile-role">@username</p>
                </div>
            </a>
            <!-- Navigation Buttons -->
            <div class="navigation-buttons">
                <a href="../Pages/live-streams.html" class="nav-button">
                    <i data-lucide="video" class="nav-button-icon"></i>
                    <span class="nav-button-text">Live Streams</span>
                </a>
                <a href="../Pages/search.html" class="nav-button">
                    <i data-lucide="search" class="nav-button-icon"></i>
                    <span class="nav-button-text">Search People</span>
                </a>
                <a href="../Pages/ai-learning.html" class="nav-button">
                    <i data-lucide="graduation-cap" class="nav-button-icon"></i>
                    <span class="nav-button-text">Quizzes</span>
                </a>
                <a href="../Pages/ai-jamming.html" class="nav-button">
                    <i data-lucide="music" class="nav-button-icon"></i>
                    <span class="nav-button-text">Music Mixer</span>
                </a>
            </div>
        </div>

        <!-- Center Feed - User Profile -->
        <div class="center-feed">
            <!-- Profile Card -->
            <div class="post">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                    <a href="../Pages/search.html" style="color:#667eea;text-decoration:none;display:flex;align-items:center;gap:6px;"><i data-lucide="arrow-left" style="width:18px;height:18px;"></i> Back</a>
                    <div style="display:flex;gap:8px;">
                        <button id="messageBtn" style="background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;display:none;"><i data-lucide="message-square" style="width:14px;height:14px;margin-right:4px;"></i>Message</button>
                        <button id="followBtn" style="background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;display:none;"><i data-lucide="user-plus" style="width:14px;height:14px;margin-right:4px;"></i>Follow</button>
                    </div>
                </div>
                <div id="userProfileContent" style="color:var(--text-secondary);">
                    Loading user profile...
                </div>
            </div>

            <!-- Tabs + Posts (outside profile card) -->
            <div id="userPostsSection" style="margin-top:16px;display:none;">
                <!-- Tab Bar (no card background — sits between the two boxes) -->
                <div style="display:flex;gap:0;border-bottom:2px solid var(--border-color);margin-bottom:16px;">
                    <button id="tabBtnPosts" onclick="switchTab('posts')" style="flex:1;background:none;border:none;padding:14px 0;font-size:14px;font-weight:600;cursor:pointer;color:#667eea;border-bottom:2px solid #667eea;margin-bottom:-2px;transition:all 0.2s;">Posts</button>
                    <button id="tabBtnMedia" onclick="switchTab('media')" style="flex:1;background:none;border:none;padding:14px 0;font-size:14px;font-weight:600;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;">Media</button>
                    <button id="tabBtnQuizzes" onclick="switchTab('quizzes')" style="flex:1;background:none;border:none;padding:14px 0;font-size:14px;font-weight:600;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;display:none;">Quizzes</button>
                </div>
                <!-- Tab Panels -->
                <div id="tabPosts">
                    <div id="userPosts" style="display:flex;flex-direction:column;gap:16px;">
                        <p style="text-align:center;color:var(--text-secondary);">Loading posts...</p>
                    </div>
                </div>
                <div id="tabMedia" style="display:none;">
                    <div id="userMedia" style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;border-radius:8px;overflow:hidden;"></div>
                </div>
                <div id="tabQuizzes" style="display:none;">
                    <div id="userQuizzes" style="display:flex;flex-direction:column;gap:12px;"></div>
                </div>
            </div>
        </div>

        <!-- Right Sidebar -->
        <div class="right-sidebar">
            <div class="notifications-card">
                <h3 class="sidebar-title">Notifications</h3>
                                <div class="notifications-list" id="sidebarNotifList"><div style="padding:8px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
                <a href="../Pages/notifications.html" class="view-all-link">View all notifications</a>
            </div>

        </div>
    </div>

    <!-- Floating Messages Sidebar -->
    <div id="messagesSidebar" class="friends-sidebar collapsed" style="cursor: pointer;">
        <div class="friends-sidebar-header" onclick="toggleMessagesSidebar()" style="cursor: pointer;">
            <h4>Messages</h4>
            <button id="closeMessagesSidebar" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary);" onclick="event.stopPropagation(); closeMessagesSidebar();"><i data-lucide="x"></i></button>
        </div>
        <div class="friends-sidebar-list" id="messagesSidebarList"><div style="padding:12px;color:var(--text-secondary);font-size:13px;">Loading...</div></div>
    </div>

    <!-- Post Detail Modal -->
    <div id="postDetailModal" onclick="if(!event.target.closest('.post-detail-panel')&&!event.target.closest('.post-detail-media'))closePostDetailModal()">
        <div>
            <!-- Left Side: Post Content -->
            <div class="post-detail-media">
                <button class="post-detail-close-btn" onclick="closePostDetailModal()"><i data-lucide="x"></i></button>
                <div id="postDetailContent">
                    <!-- Post image/media will be loaded here -->
                </div>
            </div>

            <!-- Right Side: Details & Comments -->
            <div class="post-detail-panel">
                <!-- User Info & Header -->
                <div id="postDetailHeader">
                    <!-- User info will be loaded here -->
                </div>

                <!-- Post Text Content -->
                <div id="postDetailText">
                    <!-- Post text will be loaded here -->
                </div>

                <!-- Engagement Stats -->
                <div id="postEngagementStats">
                    <!-- Stats will be loaded here -->
                </div>

                <!-- Action Buttons -->
                <div id="postDetailActions" style="display:flex;gap:12px;padding:12px 20px;border-top:1px solid var(--border-color);border-bottom:1px solid var(--border-color);">
                    <!-- Action buttons will be loaded here -->
                </div>

                <!-- Comments Section -->
                <div class="post-detail-comments-section">
                    <!-- Comment Input -->
                    <div class="post-detail-comment-input-wrapper">
                        <input type="text" id="postDetailCommentInput" placeholder="Post your reply..." onkeydown="if(event.key==='Enter'){submitPostDetailComment();}">
                        <button class="post-detail-reply-btn" onclick="submitPostDetailComment()">Reply</button>
                    </div>

                    <div id="postDetailComments">
                        <!-- Comments will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="conversationModal" style="display: none; position: fixed; bottom: 24px; right: 24px; z-index: 2000; width: 340px; height: 480px;">
        <div style="background: var(--bg-secondary); border-radius: 16px; width: 100%; height: 100%; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.3); overflow: hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#667eea,#764ba2);flex-shrink:0;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div id="chatAvatar" style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;"></div>
                    <div>
                        <div id="chatTitle" style="color:white;font-weight:600;font-size:14px;">Chat</div>
                        <div id="chatUsername" style="color:rgba(255,255,255,0.7);font-size:11px;"></div>
                    </div>
                </div>
                <div style="display:flex;gap:6px;"><button id="chatProfileBtn" style="background:rgba(255,255,255,0.1);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#ccc;" title="View Profile"><i data-lucide="user" style="width:14px;height:14px;"></i></button><button onclick="closeConversationModal()" style="background:rgba(255,255,255,0.1);border:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#ccc;"><i data-lucide="x" style="width:14px;height:14px;"></i></button></div>
            </div>
            <div id="messagesContainer" class="messages-container" style="flex-grow:1;overflow-y:auto;padding:12px;background:var(--bg-primary);"></div>
            <div style="padding:10px 12px;border-top:1px solid var(--border-color);display:flex;gap:8px;flex-shrink:0;">
                <input type="text" id="messageInput" placeholder="Type a message..." style="flex:1;padding:8px 12px;border-radius:20px;border:1px solid var(--border-color);background:var(--bg-secondary);color:var(--text-primary);outline:none;font-size:13px;" onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" style="background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:white;padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:500;font-size:13px;">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        let viewedUserId = null;

        window.addEventListener('load', () => {
            const userFirstName = localStorage.getItem('userFirstName') || 'User';
            const userLastName = localStorage.getItem('userLastName') || 'Profile';
            
            // Ensure profile card is updated
            const profileName = document.getElementById('profileName');
            const profileRole = document.getElementById('profileRole');
            
            if (profileName) {
                profileName.textContent = `${userFirstName} ${userLastName}`;
            }
            if (profileRole) {
                profileRole.textContent = `@${userFirstName.toLowerCase()}${userLastName.toLowerCase()}`;
            }
            if (!localStorage.getItem('userId')) window.location.href = '../Pages/login.html';
            
            // Load user profile
            loadUserProfile();
        });

        async function loadUserProfile() {
            const params = new URLSearchParams(window.location.search);
            viewedUserId = params.get('userId');
            const currentUserId = localStorage.getItem('userId');
            
            if (!viewedUserId) {
                document.getElementById('userProfileContent').innerHTML = '<p style="color:var(--text-secondary);text-align:center;">No user specified.</p>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/users/${viewedUserId}`);
                if (!response.ok) throw new Error('User not found');
                const user = await response.json();
                displayUserProfile(user);
                
                // Show message button
                document.getElementById('messageBtn').style.display = 'inline-block';
                document.getElementById('messageBtn').onclick = () => openDirectMessage(user.id, user.firstName + ' ' + user.lastName, user.profilePicture, user.username);
                
                // Show follow button if not viewing own profile
                if (String(currentUserId) !== String(viewedUserId)) {
                    document.getElementById('followBtn').style.display = 'inline-block';
                    checkFollowStatus();
                }
                
                // Load user posts
                loadUserPosts();
            } catch (e) {
                document.getElementById('userProfileContent').innerHTML = '<p style="color:var(--text-secondary);text-align:center;">Could not load user profile.</p>';
            }
        }

        async function checkFollowStatus() {
            try {
                const currentUserId = localStorage.getItem('userId');
                const response = await fetch(`${API_BASE_URL}/users/${viewedUserId}/followers/check?userId=${currentUserId}`);
                const data = await response.json();
                const followBtn = document.getElementById('followBtn');
                
                if (data.isFollowing) {
                    followBtn.innerHTML = '<i data-lucide="user-check" style="width:14px;height:14px;margin-right:4px;"></i>Following';
                    followBtn.style.background = 'rgba(102,126,234,0.2)';
                    followBtn.style.color = '#667eea';
                    followBtn.onclick = unfollowUser;
                } else {
                    followBtn.innerHTML = '<i data-lucide="user-plus" style="width:14px;height:14px;margin-right:4px;"></i>Follow';
                    followBtn.style.background = 'linear-gradient(135deg,#667eea,#764ba2)';
                    followBtn.style.color = 'white';
                    followBtn.onclick = followUser;
                }
                lucide.createIcons();
            } catch (e) {
                console.error('Error checking follow status:', e);
            }
        }

        async function followUser() {
            try {
                const currentUserId = localStorage.getItem('userId');
                const response = await fetch(`${API_BASE_URL}/users/${viewedUserId}/follow`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId })
                });
                if (response.ok) {
                    checkFollowStatus();
                }
            } catch (e) {
                console.error('Error following user:', e);
            }
        }

        async function unfollowUser() {
            try {
                const currentUserId = localStorage.getItem('userId');
                const response = await fetch(`${API_BASE_URL}/users/${viewedUserId}/unfollow`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId })
                });
                if (response.ok) {
                    checkFollowStatus();
                }
            } catch (e) {
                console.error('Error unfollowing user:', e);
            }
        }

        let _allUserPosts = [];
        let _tabLoaded = { posts: false, media: false, quizzes: false };

        function toggleUpBio() {
            const el = document.getElementById('upBioText');
            const btn = document.getElementById('upBioBtn');
            if (!el || !btn) return;
            if (el.dataset.expanded) {
                el.textContent = window._upBioShort;
                delete el.dataset.expanded;
                btn.textContent = 'See more';
            } else {
                el.textContent = window._upBioFull;
                el.dataset.expanded = '1';
                btn.textContent = 'See less';
            }
        }

        function switchTab(tab) {
            ['posts','media','quizzes'].forEach(t => {
                document.getElementById('tabBtn' + t.charAt(0).toUpperCase() + t.slice(1)).style.color = t === tab ? '#667eea' : 'var(--text-secondary)';
                document.getElementById('tabBtn' + t.charAt(0).toUpperCase() + t.slice(1)).style.borderBottomColor = t === tab ? '#667eea' : 'transparent';
                document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === tab ? 'block' : 'none';
            });
            if (tab === 'media' && !_tabLoaded.media) { _tabLoaded.media = true; displayUserMedia(_allUserPosts); }
            if (tab === 'quizzes' && !_tabLoaded.quizzes) { _tabLoaded.quizzes = true; loadUserQuizzes(); }
        }

        function displayUserMedia(posts) {
            const container = document.getElementById('userMedia');
            const mediaPosts = posts.filter(p => p.imageData);
            if (!mediaPosts.length) {
                container.style.display = 'block';
                container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;grid-column:1/-1;padding:20px;">No media yet.</p>';
                return;
            }
            container.innerHTML = mediaPosts.map(p => {
                try {
                    const items = JSON.parse(p.imageData);
                    if (Array.isArray(items) && items.length) {
                        const first = items[0];
                        return first.type === 'video'
                            ? `<div onclick="openPostModal(${p.id}, event)" style="cursor:pointer;aspect-ratio:1;overflow:hidden;background:#000;"><video src="${first.dataUrl}" style="width:100%;height:100%;object-fit:cover;pointer-events:none;"></video></div>`
                            : `<div onclick="openPostModal(${p.id}, event)" style="cursor:pointer;aspect-ratio:1;overflow:hidden;"><img src="${first.dataUrl}" style="width:100%;height:100%;object-fit:cover;"></div>`;
                    }
                } catch {}
                return `<div onclick="openPostModal(${p.id}, event)" style="cursor:pointer;aspect-ratio:1;overflow:hidden;"><img src="${p.imageData}" style="width:100%;height:100%;object-fit:cover;"></div>`;
            }).join('');
        }

        async function loadUserQuizzes() {
            const container = document.getElementById('userQuizzes');
            container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:20px;">Loading quizzes...</p>';
            try {
                const res = await fetch(`${API_BASE_URL}/quizzes/creator/${viewedUserId}`);
                const quizzes = res.ok ? await res.json() : [];
                if (!quizzes.length) {
                    container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:20px;">No quizzes created yet.</p>';
                    return;
                }
                container.innerHTML = quizzes.map(q => `
                    <div style="border:1px solid var(--border-color);border-radius:12px;padding:16px;background:var(--bg-secondary);display:flex;justify-content:space-between;align-items:center;gap:12px;" onclick="window.location.href='quiz-interface.html?id=${q.id}'" style="cursor:pointer;">
                        <div>
                            <p style="color:var(--text-primary);font-weight:600;margin:0 0 4px;font-size:14px;">${q.title || 'Untitled Quiz'}</p>
                            <p style="color:var(--text-secondary);font-size:12px;margin:0;">${q.description || ''}</p>
                            <p style="color:var(--text-secondary);font-size:11px;margin:4px 0 0;">${q.totalQuestions || 0} questions • ${q.difficultyLevel || 'any'} difficulty</p>
                        </div>
                        <button onclick="event.stopPropagation();window.location.href='quiz-interface.html?id=${q.id}'" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap;">Take Quiz</button>
                    </div>`).join('');
            } catch (e) {
                container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:20px;">Could not load quizzes.</p>';
            }
        }

        async function loadUserPosts() {
            try {
                const response = await fetch(`${API_BASE_URL}/users/${viewedUserId}/posts`);
                if (!response.ok) throw new Error('Failed to load posts');
                const posts = await response.json();
                _allUserPosts = posts;
                _tabLoaded.posts = true;
                displayUserPosts(posts);
            } catch (e) {
                console.error('Error loading user posts:', e);
                document.getElementById('userPostsSection').style.display = 'block';
                document.getElementById('userPosts').innerHTML = '<p style="color:var(--text-secondary);text-align:center;">Could not load posts.</p>';
            }
        }

        function _upTimeAgo(ts) {
            if (!ts) return '';
            const normalized = !ts.endsWith('Z') ? ts.replace(' ', 'T') + 'Z' : ts;
            const diff = Math.floor((Date.now() - new Date(normalized)) / 1000);
            if (diff < 60) return 'just now';
            if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
            if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
            return new Date(normalized).toLocaleDateString();
        }

        function _upRenderMediaHtml(imageData) {
            if (!imageData) return '';
            let items;
            try { items = JSON.parse(imageData); } catch { items = null; }
            if (Array.isArray(items)) {
                if (items.length === 1) {
                    const m = items[0];
                    return m.type === 'video'
                        ? `<div style="width:100%;border-radius:10px;overflow:hidden;margin:6px 0;"><video controls src="${m.dataUrl}" style="width:100%;max-height:360px;display:block;"></video></div>`
                        : `<div style="width:100%;height:360px;border-radius:10px;overflow:hidden;margin:6px 0;"><img src="${m.dataUrl}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>`;
                }
                const MAX_SHOW = 5, GAP = 3;
                const showItems = items.slice(0, MAX_SHOW);
                const extra = items.length - MAX_SHOW;
                function upcell(m, showOverlay) {
                    const media = m.type === 'video'
                        ? `<video src="${m.dataUrl}" style="width:100%;height:100%;object-fit:cover;display:block;"></video>`
                        : `<img src="${m.dataUrl}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
                    const overlay = showOverlay && extra > 0
                        ? `<div style="position:absolute;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;pointer-events:none;">+${extra}</div>`
                        : '';
                    return `<div style="position:relative;overflow:hidden;width:100%;height:100%;">${media}${overlay}</div>`;
                }
                if (showItems.length === 2) return `<div style="width:100%;height:300px;display:flex;gap:${GAP}px;border-radius:10px;overflow:hidden;margin:6px 0;"><div style="flex:1;height:300px;">${upcell(showItems[0],false)}</div><div style="flex:1;height:300px;">${upcell(showItems[1],extra>0)}</div></div>`;
                if (showItems.length === 3) return `<div style="width:100%;height:300px;display:flex;gap:${GAP}px;border-radius:10px;overflow:hidden;margin:6px 0;"><div style="flex:1;height:300px;">${upcell(showItems[0],false)}</div><div style="flex:1;height:300px;display:flex;flex-direction:column;gap:${GAP}px;"><div style="flex:1;min-height:0;">${upcell(showItems[1],false)}</div><div style="flex:1;min-height:0;">${upcell(showItems[2],extra>0)}</div></div></div>`;

                return `<div style="width:100%;height:300px;display:flex;gap:${GAP}px;border-radius:10px;overflow:hidden;margin:6px 0;"><div style="flex:1;height:300px;display:flex;flex-direction:column;gap:${GAP}px;"><div style="flex:1;min-height:0;">${upcell(showItems[0],false)}</div><div style="flex:1;min-height:0;">${upcell(showItems[1],false)}</div></div><div style="flex:1;height:300px;display:flex;flex-direction:column;gap:${GAP}px;"><div style="flex:1;min-height:0;">${upcell(showItems[2],false)}</div><div style="flex:1;min-height:0;">${upcell(showItems[3],false)}</div><div style="flex:1;min-height:0;">${upcell(showItems[4],true)}</div></div></div>`;
            }
            return `<div style="width:100%;height:360px;border-radius:10px;overflow:hidden;margin:6px 0;"><img src="${imageData}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>`;

        function displayUserPosts(posts) {

                section.style.display = 'block';

                <div class="post post-card-profile" data-post-id="${post.id}" onclick="openPostModal(${post.id}, event)" style="cursor:pointer;">

                            <div class="post-avatar">${avatarHtml}</div>
                            <div class="post-meta">
                                <p class="post-author"><strong>${post.firstName || ''} ${post.lastName || ''}</strong></p>

                        <span class="action-item" onclick="toggleRepost(this, ${post.id})" data-reposted="0" data-post-id="${post.id}" style="cursor:pointer;user-select:none;"><i data-lucide="repeat-2" class="repost-icon" style="width:16px;height:16px;"></i> <span class="repost-count">${post.repostCount||0}</span> Repost</span>
                        <span class="action-item" onclick="toggleCommentBox(this, ${post.id})" style="cursor:pointer;user-select:none;"><i data-lucide="message-circle" style="width:16px;height:16px;"></i> <span class="comment-count">${post.commentCount||0}</span> Comment</span>

                    </div>

            lucide.createIcons();

                : `<div style="width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;"><i data-lucide="user" style="width:40px;height:40px;color:white;"></i></div>`;

            const BIO_LIMIT = 150;
            let bioHtml = '';

            const html = `
                <div style="display:flex;flex-direction:column;gap:12px;">
                    <div style="display:flex;align-items:flex-start;gap:24px;">
                        <div style="flex-shrink:0;">
                            ${avatarHtml}
                        </div>
                        <div style="flex:1;min-width:0;padding-top:4px;text-align:left;">
                            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                                <h2 style="color:var(--text-primary);margin:0;font-size:22px;font-weight:700;">${user.firstName || ''} ${user.lastName || ''}</h2>
                                <span style="font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600;${badgeStyle}">${badgeLabel}</span>
                            </div>
                            <p style="color:#667eea;font-size:14px;margin:4px 0 2px;">@${user.username || 'user'}</p>
                            ${instrumentText ? `<p style="color:var(--text-secondary);font-size:14px;margin:2px 0;">${instrumentText}</p>` : ''}
                            ${user.location ? `<p style="color:var(--text-secondary);font-size:13px;margin:6px 0 0;display:flex;align-items:center;gap:4px;"><i data-lucide="map-pin" style="width:13px;height:13px;"></i>${user.location}</p>` : ''}
                            ${user.website ? `<p style="font-size:13px;margin:4px 0 0;display:flex;align-items:center;gap:4px;"><i data-lucide="link" style="width:13px;height:13px;color:#667eea;"></i><a href="${user.website}" target="_blank" style="color:#667eea;text-decoration:none;">${user.website}</a></p>` : ''}
                        </div>
                    </div>
                    ${bioHtml ? `<div style="text-align:left;">${bioHtml}</div>` : ''}
                </div>
            `;
            
            document.getElementById('userProfileContent').innerHTML = html;

            // Show Quizzes tab only for instructors
            const quizzesBtn = document.getElementById('tabBtnQuizzes');
            if (quizzesBtn) quizzesBtn.style.display = user.accountType === 'instructor' ? '' : 'none';
            
            // Call lucide.createIcons with error handling
            try {
                if (typeof lucide !== 'undefined' && lucide.createIcons) {
                    lucide.createIcons();
                }
            } catch (e) {
                console.warn('Lucide icon rendering warning:', e);
            }
        }

        // Settings Dropdown
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsDropdown = document.getElementById('settingsDropdown');
        const themeLightDarkBtn = document.getElementById('themeLightDark');
        
        // Toggle dropdown visibility
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsDropdown.classList.toggle('show');
        });
        
        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!settingsBtn.contains(e.target) && !settingsDropdown.contains(e.target)) {
                settingsDropdown.classList.remove('show');
            }
        });
        
        // Update theme button text based on current theme
        function updateThemeButtonText() {
            const isDark = document.body.classList.contains('dark-theme');
            themeLightDarkBtn.innerHTML = isDark ? '<span><i data-lucide="sun"></i> Light Mode</span>' : '<span><i data-lucide="moon" style="width:14px;height:14px;"></i> Dark Mode</span>';
            lucide.createIcons();
        }
        
        // Theme Toggle
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-theme');
        }
        updateThemeButtonText();
        
        themeLightDarkBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButtonText();
            settingsDropdown.classList.remove('show');
        });
        
        // Messages
        const messagesSidebar = document.getElementById('messagesSidebar');
        
        function toggleMessagesSidebar() {
            messagesSidebar.classList.toggle('collapsed');
        }
        
        function closeMessagesSidebar() {
            messagesSidebar.classList.add('collapsed');
        }

        function logout() {
            localStorage.removeItem('userId');
            localStorage.removeItem('userFirstName');
            localStorage.removeItem('userLastName');
            window.location.href = '../Pages/login.html';
        }

        // Post interaction functions
        async function toggleLike(el) {
            if (window.event) window.event.stopPropagation();
            if (!el) return;
            
            const postCard = el.closest('[data-post-id]');
            const postId = postCard?.dataset.postId;
            const userId = localStorage.getItem('userId');
            if (!postId || !userId) return;
            
            try {
                const res = await fetch(`${API_BASE_URL}/posts/${postId}/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                const data = await res.json();
                
                // Find the SVG icon (rendered by Lucide)
                const icon = el.querySelector('svg[data-lucide="heart"]');
                const countSpan = el.querySelector('.like-count');
                
                if (!icon || !countSpan) return;
                
                el.dataset.liked = data.liked ? '1' : '0';
                
                // Toggle icon fill and color
                icon.style.fill = data.liked ? 'currentColor' : 'none';
                icon.style.color = data.liked ? '#e0245e' : 'inherit';
                el.style.color = data.liked ? '#e0245e' : '';
                
                countSpan.textContent = data.likeCount || 0;
            } catch (e) {
                console.error('Like error:', e);
            }
        }

        async function toggleRepost(el, postId) {
            if (window.event) window.event.stopPropagation();
            if (!el) return;
            
            const userId = localStorage.getItem('userId');
            if (!userId) return;
            
            const countSpan = el.querySelector('.repost-count') || el.querySelector('span');
            
            try {
                const res = await fetch(`${API_BASE_URL}/posts/${postId}/repost`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                const data = await res.json();
                el.dataset.reposted = data.reposted ? '1' : '0';
                el.style.color = data.reposted ? '#17bf63' : '';
                countSpan.textContent = data.repostCount;
            } catch (e) {
                console.error('Repost error:', e);
            }
        }

        async function toggleCommentBox(el, postId) {
            if (window.event) window.event.stopPropagation();
            if (!el) return;
            
            const post = el.closest('[data-post-id]');
            if (!post) return;
            
            const box = post.querySelector('.comment-box');
            if (!box) return;
            
            const isHidden = box.style.display === 'none';
            box.style.display = isHidden ? 'block' : 'none';
            
            if (isHidden) {
                if (box.dataset.loaded === '0') {
                    box.dataset.loaded = '1';
                    try {
                        const res = await fetch(`${API_BASE_URL}/posts/${postId}/comments`);
                        const comments = await res.json();
                        const list = box.querySelector('.comments-list');
                        if (list) {
                            list.innerHTML = '';
                            comments.forEach(c => {
                                const commentEl = document.createElement('div');
                                commentEl.style.cssText = 'padding:8px 0;font-size:12px;border-bottom:1px solid var(--border-color);';
                                commentEl.innerHTML = `<p style="margin:0;color:var(--text-primary);"><strong>${c.firstName} ${c.lastName}</strong></p><p style="margin:4px 0 0 0;color:var(--text-secondary);">${c.content}</p>`;
                                list.appendChild(commentEl);
                            });
                        }
                    } catch (e) {
                        console.error('Load comments error:', e);
                    }
                }
            }
        }

        async function submitComment(input) {
            if (!input.value.trim()) return;
            const box = input.closest('.comment-box');
            if (!box) return;
            
            const postId = box.dataset.postId;
            const userId = localStorage.getItem('userId');
            if (!userId) return;
            
            try {
                const res = await fetch(`${API_BASE_URL}/posts/${postId}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, content: input.value })
                });
                if (res.ok) {
                    input.value = '';
                    // Reload comments
                    box.dataset.loaded = '0';
                    const list = box.querySelector('.comments-list');
                    if (list) {
                        try {
                            const res2 = await fetch(`${API_BASE_URL}/posts/${postId}/comments`);
                            const comments = await res2.json();
                            list.innerHTML = '';
                            comments.forEach(c => {
                                const commentEl = document.createElement('div');
                                commentEl.style.cssText = 'padding:8px 0;font-size:12px;border-bottom:1px solid var(--border-color);';
                                commentEl.innerHTML = `<p style="margin:0;color:var(--text-primary);"><strong>${c.firstName} ${c.lastName}</strong></p><p style="margin:4px 0 0 0;color:var(--text-secondary);">${c.content}</p>`;
                                list.appendChild(commentEl);
                            });
                            
                            // Update comment count
                            const postCard = box.closest('.post-card-profile');
                            if (postCard) {
                                const commentBtn = postCard.querySelector('.comment-btn .comment-count');
                                if (commentBtn) commentBtn.textContent = comments.length;
                            }
                        } catch (e) {
                            console.error('Load comments error:', e);
                        }
                    }
                }
            } catch (e) {
                console.error('Submit comment error:', e);
            }
        }

        // Wrapper so post cards can call openPostModal(id, event) same as home.html
        async function openPostModal(postId, event) {
            if (event) event.stopPropagation();
            try {
                const res = await fetch(`${API_BASE_URL}/posts/${postId}`);
                if (!res.ok) return;
                const post = await res.json();
                openPostDetailModal(post);
            } catch (e) {
                console.error('openPostModal error:', e);
            }
        }

        // Post Detail Modal Functions
        async function openPostDetailModal(post) {
            if (!post) return;
            
            try {
                // Build media HTML for left side (carousel)
                let mediaHtml = '';
                if (post.imageData) {
                    try {
                        const items = JSON.parse(post.imageData);
                        if (Array.isArray(items) && items.length > 0) {
                            const slides = items.map((m, i) => {
                                const media = m.type === 'video'
                                    ? `<video controls src="${m.dataUrl}" style="max-width:100%;max-height:100%;object-fit:contain;display:block;border-radius:8px;"></video>`
                                    : `<img src="${m.dataUrl}" style="max-width:100%;max-height:100%;object-fit:contain;display:block;border-radius:8px;">`;
                                return `<div class="carousel-slide" data-index="${i}" style="display:${i===0?'flex':'none'};align-items:center;justify-content:center;width:100%;height:100%;">${media}</div>`;
                            }).join('');
                            const arrows = items.length > 1 ? `
                                <button onclick="carouselPrev()" onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(0,0,0,0.35)'" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.35);border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;z-index:10;transition:background 0.2s;"><i data-lucide="chevron-left" style="width:24px;height:24px;pointer-events:none;"></i></button>
                                <button onclick="carouselNext()" onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(0,0,0,0.35)'" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.35);border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;z-index:10;transition:background 0.2s;"><i data-lucide="chevron-right" style="width:24px;height:24px;pointer-events:none;"></i></button>
                            ` : '';
                            mediaHtml = `<div id="postCarousel" data-current="0" data-total="${items.length}" style="position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;">${slides}${arrows}</div>`;
                        }
                    } catch (e) {
                        if (post.imageData && typeof post.imageData === 'string' && (post.imageData.startsWith('data:') || post.imageData.startsWith('http'))) {
                            mediaHtml = `<img src="${post.imageData}" style="max-width:100%;max-height:100%;object-fit:contain;display:block;">`;
                        }
                    }
                }
                
                // Set left side content (media)
                const contentDiv = document.getElementById('postDetailContent');
                contentDiv.innerHTML = mediaHtml || '<p style="color:var(--text-secondary);text-align:center;">No media</p>';
                
                // Set right side header (user info)
                const date = new Date(post.createdAt).toLocaleDateString();
                const headerDiv = document.getElementById('postDetailHeader');
                const userId = localStorage.getItem('userId');
                const isOwner = String(post.userId) === String(userId);
                headerDiv.innerHTML = `
                    <img src="${post.profilePicture || 'https://via.placeholder.com/36'}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23667eea%22><circle cx=%2212%22 cy=%228%22 r=%224%22/><path d=%22M12 14c-4 0-6 2-6 4v2h12v-2c0-2-2-4-6-4z%22/></svg>'">
                    <div style="flex:1;">
                        <p style="color:var(--text-primary);font-weight:600;margin:0;font-size:14px;">${post.firstName || ''} ${post.lastName || ''}</p>
                        <p style="color:var(--text-secondary);font-size:12px;margin:0;">@${post.username || 'user'}</p>
                    </div>
                    ${isOwner ? `<button onclick="deletePostFromModal(${post.id})" style="background:transparent;border:none;cursor:pointer;color:var(--text-secondary);padding:6px;border-radius:6px;transition:all 0.2s;display:flex;align-items:center;" onmouseover="this.style.color='#e0245e';this.style.background='rgba(224,36,94,0.1)'" onmouseout="this.style.color='var(--text-secondary)';this.style.background='transparent'" title="Delete post"><i data-lucide="trash-2" style="width:16px;height:16px;"></i></button>` : ''}
                `;
                
                // Set post text content on right side
                const textDiv = document.getElementById('postDetailText');
                if (post.content && post.content.trim()) {
                    textDiv.style.display = 'block';
                    textDiv.innerHTML = `<p style="margin:0;">${post.content}</p>`;
                } else {
                    textDiv.style.display = 'none';
                }
                
                // Set engagement stats (3 items: like, repost, reply - all from database)
                const statsDiv = document.getElementById('postEngagementStats');
                
                // Fetch user's reactions and counts from database
                let reactionsData = { liked: false, reposted: false, replied: false, likeCount: 0, repostCount: 0, replyCount: 0 };
                try {
                    const reactRes = await fetch(`${API_BASE_URL}/posts/${post.id}/reactions?userId=${userId}`);
                    if (reactRes.ok) {
                        reactionsData = await reactRes.json();
                    }
                } catch (e) {
                    console.error('Error fetching reactions:', e);
                }
                
                statsDiv.innerHTML = `
                    <span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;${reactionsData.liked ? 'color:#e0245e;' : ''}" onclick="togglePostLike(event, ${post.id})" class="post-like-btn" data-liked="${reactionsData.liked ? '1' : '0'}"><i data-lucide="heart" style="width:14px;height:14px;stroke-width:2;${reactionsData.liked ? 'fill:currentColor;' : ''}"></i><span class="like-count" style="font-size:12px;">${reactionsData.likeCount}</span></span>
                    <span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;" onclick="togglePostRepost(event, ${post.id})" class="post-repost-btn" data-reposted="${reactionsData.reposted ? '1' : '0'}"><i data-lucide="repeat-2" style="width:14px;height:14px;stroke-width:2;${reactionsData.reposted ? 'fill:currentColor;' : ''}"></i><span class="repost-count" style="font-size:12px;">${reactionsData.repostCount}</span></span>
                    <span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;" onclick="togglePostReply(event, ${post.id})" class="post-reply-btn"><i data-lucide="reply" style="width:14px;height:14px;stroke-width:2;"></i><span class="reply-count" style="font-size:12px;">${post.commentCount || 0}</span></span>
                `;

                const actionsDiv = document.getElementById('postDetailActions');

                            const isCOwner = String(c.userId) === String(userId);
                            return `<div style="padding:12px 16px;border-bottom:1px solid var(--border-color);display:flex;gap:8px;flex-direction:column;"><div style="display:flex;gap:8px;"><img src="${c.profilePicture||''}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23667eea%22><circle cx=%2212%22 cy=%228%22 r=%224%22/><path d=%22M12 14c-4 0-6 2-6 4v2h12v-2c0-2-2-4-6-4z%22/></svg>'"><div style="flex:1;"><div style="display:flex;justify-content:space-between;align-items:flex-start;"><div><p style="margin:0;color:var(--text-primary);font-weight:600;font-size:12px;"><strong>${c.firstName} ${c.lastName}</strong></p><p style="margin:0 0 2px 0;color:var(--text-secondary);font-size:10px;">${ct}</p></div>${isCOwner?`<button onclick="deleteCommentFromModal(${c.id},this)" style="background:transparent;border:none;cursor:pointer;color:var(--text-secondary);padding:2px 4px;border-radius:4px;flex-shrink:0;" onmouseover="this.style.color='#e0245e';" onmouseout="this.style.color='var(--text-secondary)';"><i data-lucide="trash-2" style="width:13px;height:13px;display:inline;"></i></button>`:''}</div><p style="margin:4px 0 0 0;color:var(--text-secondary);font-size:12px;">${c.content}</p><div style="display:flex;gap:12px;margin-top:6px;font-size:11px;"><span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:3px;${lc}" onclick="toggleCommentLike(event,${c.id})" data-liked="${c.liked?'1':'0'}"><i data-lucide="heart" style="width:12px;height:12px;display:inline;${lf}"></i><span class="comment-count">${c.likeCount||0}</span></span><span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:3px;color:var(--text-secondary);" onclick="replyToComment(event,'${c.firstName} ${c.lastName}','${c.username}',${c.id})"><i data-lucide="reply" style="width:12px;height:12px;display:inline;"></i><span class="comment-count">${c.replyCount||0}</span></span></div></div></div><div id="replies-${c.id}" style="display:none;margin-left:36px;border-left:2px solid var(--border-color);padding-left:8px;"></div></div>`;

        async function loadAndRenderReplies(commentId) {
            const repliesDiv = document.getElementById(`replies-${commentId}`);
            if (!repliesDiv) return;
            try {
                const userId = localStorage.getItem('userId');
                const res = await fetch(`${API_BASE_URL}/comments/${commentId}/replies?userId=${userId}`);
                const replies = await res.json();
                repliesDiv.innerHTML = replies.length === 0
                    ? '<p style="color:var(--text-secondary);font-size:11px;padding:4px 0;">No replies yet</p>'
                    : replies.map(r => buildReplyHtml(r, commentId)).join('');
                repliesDiv.dataset.loaded = 'true';
                lucide.createIcons();
            } catch (e) { repliesDiv.innerHTML = '<p style="color:var(--text-secondary);font-size:11px;">Error loading replies</p>'; }
        }

        function buildReplyHtml(r, commentId) {
            const replyTime = new Date(r.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            const currentUserId = localStorage.getItem('userId');
            const isOwner = r.userId == currentUserId;
            const likeColor = r.liked ? 'color:#e0245e;' : '';
            const likeFill = r.liked ? 'fill:currentColor;' : '';
            let contentHtml = r.content.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const mentionMatch = contentHtml.match(/^@(\w+)\s/);
            if (mentionMatch) {
                const mu = mentionMatch[1];
                const rest = contentHtml.substring(mentionMatch[0].length).trim();
                contentHtml = `<span style="cursor:pointer;color:#667eea;font-weight:500;" onclick="navigateToProfile('${mu}')" title="Go to ${mu}'s profile">@${mu}</span> ${rest}`;
            }
            return `<div style="padding:6px 8px;margin-bottom:8px;background:var(--bg-secondary);border-radius:6px;position:relative;"><div style="display:flex;gap:6px;margin-bottom:4px;justify-content:space-between;align-items:flex-start;"><div style="display:flex;gap:6px;flex:1;"><img src="${r.profilePicture || ''}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none'"><div style="flex:1;"><p style="margin:0;font-size:11px;font-weight:600;color:var(--text-primary);">${r.firstName} ${r.lastName}</p><p style="margin:0;font-size:10px;color:var(--text-secondary);">${replyTime}</p></div></div>${isOwner ? `<button onclick="deleteReply(${r.id},${commentId})" style="padding:2px 6px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:12px;border-radius:4px;transition:all 0.2s;" onmouseover="this.style.background='var(--border-color)';this.style.color='#e0245e';" onmouseout="this.style.background='transparent';this.style.color='var(--text-secondary)';"><i data-lucide="trash-2" style="width:14px;height:14px;display:inline;"></i></button>` : ''}</div><p style="margin:0 0 6px 0;font-size:11px;color:var(--text-secondary);">${contentHtml}</p><div style="display:flex;gap:12px;font-size:10px;"><span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:3px;${likeColor}" onclick="likeReply(${r.id},${commentId},this)" data-liked="${r.liked ? '1' : '0'}"><i data-lucide="heart" style="width:12px;height:12px;display:inline;${likeFill}"></i><span class="reply-like-count">${r.likeCount || 0}</span></span><span style="cursor:pointer;user-select:none;display:flex;align-items:center;gap:3px;color:var(--text-secondary);" onclick="replyToReply(event,'${r.firstName} ${r.lastName}','${r.username || ''}',${r.id},${commentId})"><i data-lucide="reply" style="width:12px;height:12px;display:inline;"></i><span>Reply</span></span></div></div>`;
        }

        function replyToComment(event, userName, userUsername, commentId) {
            event.stopPropagation();
            const repliesDiv = document.getElementById(`replies-${commentId}`);
            document.querySelectorAll('.comment-reply-input-box').forEach(box => box.remove());
            repliesDiv.innerHTML = '';
            repliesDiv.style.display = 'block';
            repliesDiv.dataset.mode = 'input';
            delete repliesDiv.dataset.loaded;
            const replyInputBox = document.createElement('div');
            replyInputBox.className = 'comment-reply-input-box';
            replyInputBox.style.cssText = 'padding:8px;background:var(--input-bg,var(--card-bg));border-radius:6px;margin-bottom:8px;';
            replyInputBox.innerHTML = `<input type="text" class="inline-comment-input" placeholder="Write a reply..." style="width:100%;padding:8px 12px;border-radius:20px;border:1px solid var(--border-color);background:var(--input-bg,var(--card-bg));color:var(--text-primary);outline:none;font-size:13px;box-sizing:border-box;" /><div style="display:flex;gap:6px;margin-top:6px;justify-content:flex-end;"><button style="padding:4px 12px;border-radius:16px;border:1px solid var(--border-color);background:transparent;color:var(--text-primary);cursor:pointer;font-size:12px;" onclick="cancelReplyComment(this)">Cancel</button><button style="padding:4px 12px;border-radius:16px;border:none;background:#667eea;color:white;cursor:pointer;font-size:12px;" onclick="submitInlineReply(this,${commentId},'${userUsername}')">Reply</button></div>`;
            repliesDiv.appendChild(replyInputBox);
            const input = repliesDiv.querySelector('.inline-comment-input');
            input.value = `@${userUsername} `;
            input.focus();
            input.selectionStart = input.selectionEnd = input.value.length;
        }

        async function deleteReply(replyId, commentId) {
            showDeleteConfirm('Delete Reply?', 'This action cannot be undone. The reply will be permanently deleted.', async () => {
            try {
                const userId = localStorage.getItem('userId');
                if (!userId) return;
                const res = await fetch(`${API_BASE_URL}/comments/replies/${replyId}`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId }) });
                if (res.ok) { const repliesDiv = document.getElementById(`replies-${commentId}`); repliesDiv.dataset.loaded = ''; await loadAndRenderReplies(commentId); }
            } catch (e) { console.error('Error deleting reply:', e); }
            });
        }

        function cancelReplyComment(btn) { btn.closest('.comment-reply-input-box').remove(); }

        async function submitInlineReply(btn, commentId, mentionedUsername) {
            const inputBox = btn.closest('.comment-reply-input-box');
            const input = inputBox.querySelector('.inline-comment-input');
            const text = input.value.trim();
            if (!text) return;
            const userId = localStorage.getItem('userId');
            if (!userId) return;
            try {
                const res = await fetch(`${API_BASE_URL}/comments/${commentId}/reply`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, content: text }) });
                if (!res.ok) return;
                inputBox.remove();
                const repliesDiv = document.getElementById(`replies-${commentId}`);
                repliesDiv.dataset.loaded = 'false';
                await loadAndRenderReplies(commentId);
            } catch (e) { console.error('Submit inline reply error:', e); }
        }

        async function likeReply(replyId, commentId, el) {
            const userId = localStorage.getItem('userId');
            if (!userId) return;
            try {
                const res = await fetch(`${API_BASE_URL}/comments/replies/${replyId}/like`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId }) });
                if (!res.ok) return;
                const data = await res.json();
                el.dataset.liked = data.liked ? '1' : '0';
                el.style.color = data.liked ? '#e0245e' : 'var(--text-secondary)';
                const svg = el.querySelector('svg');

                const likeCount = el.querySelector('.reply-like-count');
                if (likeCount) likeCount.textContent = data.likeCount;
            } catch (e) { console.error('Error liking reply:', e); }
        }

        function replyToReply(event, userName, userUsername, replyId, commentId) {
            event.stopPropagation();
            replyToComment(event, userName, userUsername, commentId);
        }
        
        async function toggleCommentReplies(event, commentId) {
            event.stopPropagation();
            const repliesDiv = document.getElementById(`replies-${commentId}`);
            document.querySelectorAll('.comment-reply-input-box').forEach(box => box.remove());
            if (repliesDiv.style.display === 'none' || repliesDiv.dataset.mode !== 'replies') {
                repliesDiv.style.display = 'block';
                repliesDiv.dataset.mode = 'replies';
                if (repliesDiv.dataset.loaded !== 'true') { await loadAndRenderReplies(commentId); }
            } else {
                repliesDiv.style.display = 'none';
            }
        }
        
        async function toggleCommentLike(event, commentId) {
            event.stopPropagation();
            let el = event.currentTarget;
            if (el.tagName === 'svg' || el.tagName === 'SVG') el = el.parentElement;
            const icon = el.querySelector('svg[data-lucide="heart"]');
            const countSpan = el.querySelector('.comment-count');
            const userId = localStorage.getItem('userId');
            try {
                const res = await fetch(`${API_BASE_URL}/comments/${commentId}/like`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId }) });
                const data = await res.json();
                el.dataset.liked = data.liked ? '1' : '0';
                if (icon) { icon.style.fill = data.liked ? 'currentColor' : 'none'; el.style.color = data.liked ? '#e0245e' : ''; }
                if (countSpan) countSpan.textContent = data.likeCount;
            } catch (e) { console.error('Error toggling comment like:', e); }
        }

        function navigateToProfile(username) {
            window.location.href = `user-profile.html?username=${username}`;

        // Close modal on overlay click or Escape
        document.addEventListener('keydown', function(e) {

<!-- Custom Delete Confirm Modal -->
<div id="deleteConfirmOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99999;display:none;align-items:center;justify-content:center;">
    <div style="background:var(--card-bg,#1e1e2e);border-radius:16px;padding:32px 28px;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
        <div style="width:64px;height:64px;background:rgba(224,36,94,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <i data-lucide="trash-2" style="width:28px;height:28px;color:#e0245e;"></i>
        </div>
        <h3 id="deleteConfirmTitle" style="margin:0 0 8px;color:var(--text-primary,#fff);font-size:20px;font-weight:700;"></h3>
        <p id="deleteConfirmMessage" style="margin:0 0 24px;color:var(--text-secondary,#aaa);font-size:14px;line-height:1.5;"></p>
        <div style="display:flex;gap:12px;justify-content:center;">
            <button onclick="dismissDeleteConfirm()" style="flex:1;padding:11px 0;border-radius:10px;border:1.5px solid var(--border-color,#333);background:transparent;color:var(--text-primary,#fff);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">Cancel</button>
            <button id="deleteConfirmBtn" style="flex:1;padding:11px 0;border-radius:10px;border:none;background:#e0245e;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='#c01d4e'" onmouseout="this.style.background='#e0245e'">Delete</button>
        </div>
    </div>
</div>
<script>
    function showDeleteConfirm(title, message, onConfirm) {
        document.getElementById('deleteConfirmTitle').textContent = title;
        document.getElementById('deleteConfirmMessage').textContent = message;
        const overlay = document.getElementById('deleteConfirmOverlay');
        overlay.style.display = 'flex';
        lucide.createIcons();
        const btn = document.getElementById('deleteConfirmBtn');
        btn.onclick = () => { dismissDeleteConfirm(); onConfirm(); };
    }
    function dismissDeleteConfirm() {
        document.getElementById('deleteConfirmOverlay').style.display = 'none';
    }
    document.getElementById('deleteConfirmOverlay').addEventListener('click', function(e) {
        if (e.target === this) dismissDeleteConfirm();
    });
</script>
</body>
</html>
